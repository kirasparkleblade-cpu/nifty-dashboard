<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Indian Market Heatmap</title>

<style>

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#ffffff;
}

body{

    padding:12px;

    box-sizing:border-box;
}

.widget{

    width:100%;
    height:100%;

    border:1px solid #ececec;

    border-radius:28px;

    overflow:hidden;

    background:#ffffff;
}

.tradingview-widget-container{

    width:100%;
    height:100%;
}

.tradingview-widget-container__widget{

    width:100%;
    height:100%;
}

</style>

</head>

<body>

<div class="widget">

<div class="tradingview-widget-container">

<div class="tradingview-widget-container__widget"></div>

<script
type="text/javascript"
src="https://s3.tradingview.com/external-embedding/embed-widget-stock-heatmap.js"
async>
{
  "dataSource": "SENSEX",
  "blockSize": "market_cap_basic",
  "blockColor": "change",
  "grouping": "sector",
  "locale": "en",
  "symbolUrl": "",
  "colorTheme": "light",
  "exchanges": [],
  "hasTopBar": false,
  "isDataSetEnabled": false,
  "isZoomEnabled": true,
  "hasSymbolTooltip": true,
  "isMonoSize": false,
  "width": "100%",
  "height": "100%"
}
</script>

</div>

</div>

</body>

</html>
