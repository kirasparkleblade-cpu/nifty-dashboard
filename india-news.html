<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Indian Market News</title>

<style>

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    background:transparent;

    overflow:hidden;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    sans-serif;
}

.wrapper{

    width:100%;
    height:100%;

    border-radius:24px;

    overflow:hidden;

    border:1px solid #ececec;

    background:white;
}

.tradingview-widget-container{

    width:100%;
    height:100%;
}

.tradingview-widget-container__widget{

    width:100%;
    height:100%;
}

</style>

</head>

<body>

<div class="wrapper">

<div class="tradingview-widget-container">

<div class="tradingview-widget-container__widget"></div>

<script
type="text/javascript"
src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js"
async>

{
"feedMode":"market",
"market":"stock",
"isTransparent":true,
"displayMode":"regular",
"width":"100%",
"height":"100%",
"colorTheme":"light",
"locale":"en"
}

</script>

</div>

</div>

</body>

</html>
