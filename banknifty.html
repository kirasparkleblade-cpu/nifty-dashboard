<script>

const SHEET_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnV2YkleLyZu7oH4sRkaSV1k1KToH05LgWDi4xR0wcKquNeuI8134CcF3n8O1OlbvAIedrQq4XvS4f/pub?output=csv';

const priceElement =
document.getElementById('price');

let lastPrice = '--';

async function fetchBankNifty() {

    try {

        const response =
        await fetch(SHEET_URL);

        const text =
        await response.text();

        const rows =
        text.split('\n');

        let value = null;

        rows.forEach(row => {

            const cols = row.split(',');

            if (
                cols[0]
                .toUpperCase()
                .includes('BANK')
            ) {

                value =
                parseFloat(cols[1]);
            }
        });

        if (
            value &&
            !isNaN(value)
        ) {

            lastPrice =
            value.toLocaleString(
                'en-IN',
                {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }
            );

            priceElement.innerText =
            lastPrice;
        }

    } catch (error) {

        console.log(error);

        priceElement.innerText =
        lastPrice;
    }
}

fetchBankNifty();

setInterval(
    fetchBankNifty,
    60000
);

</script>
