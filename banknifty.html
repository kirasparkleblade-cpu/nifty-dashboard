<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnV2YkleLyZu7oH4sRkaSV1k1KToH05LgWDi4xR0wcKquNeuI8134CcF3n8O1OlbvAIedrQq4XvS4f/pub?output=csv';

async function fetchPrice(){

    try{

        const response =
        await fetch(
            CSV_URL + '&t=' + Date.now()
        );

        const text =
        await response.text();

        const rows =
        text.trim().split('\n');

        let currentPrice = null;
        let previousClose = null;

        for(let i = 1; i < rows.length; i++){

            const columns =
            rows[i]
            .replace(/"/g,'')
            .split(',');

            const symbol =
            columns[0]
            .trim()
            .toUpperCase();

            if(symbol.includes('BANK')){

                currentPrice =
                parseFloat(columns[1]);

                previousClose =
                parseFloat(columns[2]);

                break;
            }
        }

        if(
            currentPrice === null ||
            isNaN(currentPrice)
        ){
            throw new Error();
        }

        const priceEl =
        document.getElementById('price');

        priceEl.innerText =
        currentPrice.toLocaleString(
            'en-IN',
            {
                minimumFractionDigits:2,
                maximumFractionDigits:2
            }
        );

        if(
            previousClose !== null &&
            !isNaN(previousClose)
        ){

            if(currentPrice > previousClose){

                priceEl.style.color =
                '#16a34a';

            }
            else if(currentPrice < previousClose){

                priceEl.style.color =
                '#dc2626';

            }
            else{

                priceEl.style.color =
                '#111111';

            }
        }

    }

    catch(error){

        console.error(error);

        document
        .getElementById('price')
        .innerText =
        'Unavailable';
    }
}

fetchPrice();

setInterval(
    fetchPrice,
    60000
);

</script>
