<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>BANK NIFTY Widget</title>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap"
rel="stylesheet">

<style>

html,
body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    background: #ffffff;

    font-family: 'Inter', sans-serif;

    overflow: hidden;
}

body {

    display: flex;

    align-items: center;

    justify-content: center;
}

.widget {

    width: 100vw;
    height: 100vh;

    background: #ffffff;

    display: flex;

    flex-direction: column;

    justify-content: center;

    padding-left: 6vw;

    box-sizing: border-box;
}

.label {

    font-size: 2vw;

    font-weight: 500;

    letter-spacing: 0.12em;

    color: #666666;

    margin-bottom: 1vw;
}

.price {

    font-size: 8vw;

    font-weight: 700;

    color: #111111;

    line-height: 1;
}

.live {

    margin-top: 1.5vw;

    font-size: 1.2vw;

    color: #16a34a;

    font-weight: 500;
}

</style>

</head>

<body>

<div class="widget">

<div class="label">
BANK NIFTY
</div>

<div
class="price"
id="price">
Loading...
</div>

<div class="live">
● Live
</div>

</div>

<script>

const SHEET_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnV2YkleLyZu7oH4sRkaSV1k1KToH05LgWDi4xR0wcKquNeuI8134CcF3n8O1OlbvAIedrQq4XvS4f/pub?output=csv';

const priceElement =
document.getElementById('price');

let lastPrice = '--';

async function fetchBankNifty() {

    try {

        const response =
        await fetch(SHEET_URL);

        const text =
        await response.text();

        const rows =
        text.split('\n');

        let value = null;

        rows.forEach(row => {

            const cols =
            row.split(',');

            if (
                cols[0]
                .toUpperCase()
                .includes('BANK')
            ) {

                value =
                parseFloat(cols[1]);
            }
        });

        if (
            value &&
            !isNaN(value)
        ) {

            lastPrice =
            value.toLocaleString(
                'en-IN',
                {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }
            );

            priceElement.innerText =
            lastPrice;
        }

    } catch (error) {

        console.log(error);

        priceElement.innerText =
        lastPrice;
    }
}

fetchBankNifty();

setInterval(
    fetchBankNifty,
    60000
);

</script>

</body>

</html>
