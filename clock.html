

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Inter,sans-serif;background:transparent;padding:8px;}
.widget{width:100%;max-width:340px;margin:0 auto;background:#fff;border:1px solid #ececec;border-radius:22px;overflow:hidden;}

.header{display:flex;justify-content:flex-end;align-items:center;padding:12px 14px;border-bottom:1px solid #f2f2f2;}
.switch{display:flex;background:#f5f5f5;border-radius:9px;padding:3px;gap:2px;}
.switch button{border:none;background:transparent;color:#888;padding:4px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;transition:0.2s;font-family:inherit;}
.switch button.active{background:#111;color:#fff;}

.clock-section{padding:14px 16px 10px;text-align:center;}
.time-row{display:flex;align-items:baseline;justify-content:center;gap:5px;}
.time{font-family:'Space Grotesk',sans-serif;font-size:46px;font-weight:700;color:#111;letter-spacing:-2px;line-height:1;}
.ampm{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:#111;}
.date-text{margin-top:5px;color:#999;font-size:12px;font-weight:500;}

.calendar{margin:0 12px 12px;border:1px solid #f0f0f0;border-radius:14px;overflow:hidden;}
.cal-top{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:#fafafa;border-bottom:1px solid #f0f0f0;}
.cal-month{font-weight:700;font-size:13px;color:#222;}
.cal-year{font-size:12px;color:#aaa;font-weight:500;}

.day-names{display:grid;grid-template-columns:repeat(7,1fr);padding:7px 8px 2px;}
.day-name{text-align:center;font-size:9px;color:#bbb;font-weight:600;text-transform:uppercase;letter-spacing:0.3px;}

.dates{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;padding:2px 6px 8px;}
.date-box{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:11px;color:#555;font-weight:500;}
.today{background:#111;color:#fff;font-weight:700;border-radius:8px;}
.other-month{color:#e0e0e0;}
.weekend{color:#bbb;}
.today.weekend{color:#fff;}
</style>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<div class="widget">
  <div class="header">
    <div class="switch">
      <button id="btn12" class="active">12H</button>
      <button id="btn24">24H</button>
    </div>
  </div>

  <div class="clock-section">
    <div class="time-row">
      <div class="time" id="clock">00:00:00</div>
      <div class="ampm" id="ampm">AM</div>
    </div>
    <div class="date-text" id="dateText">Saturday, May 30, 2026</div>
  </div>

  <div class="calendar">
    <div class="cal-top">
      <div class="cal-month" id="calMonth">May</div>
      <div class="cal-year" id="calYear">2026</div>
    </div>
    <div class="day-names">
      <div class="day-name">Su</div>
      <div class="day-name">Mo</div>
      <div class="day-name">Tu</div>
      <div class="day-name">We</div>
      <div class="day-name">Th</div>
      <div class="day-name">Fr</div>
      <div class="day-name">Sa</div>
    </div>
    <div class="dates" id="dates"></div>
  </div>
</div>

<script>
let is24Hour=false;
document.getElementById('btn12').onclick=()=>{is24Hour=false;document.getElementById('btn12').classList.add('active');document.getElementById('btn24').classList.remove('active');updateClock();};
document.getElementById('btn24').onclick=()=>{is24Hour=true;document.getElementById('btn24').classList.add('active');document.getElementById('btn12').classList.remove('active');updateClock();};

function updateClock(){
  const now=new Date();
  let h=now.getHours();
  const mm=String(now.getMinutes()).padStart(2,'0');
  const ss=String(now.getSeconds()).padStart(2,'0');
  const ampmEl=document.getElementById('ampm');
  if(!is24Hour){
    ampmEl.textContent=h>=12?'PM':'AM';
    ampmEl.style.display='';
    h=h%12||12;
  } else {
    ampmEl.style.display='none';
  }
  document.getElementById('clock').textContent=String(h).padStart(2,'0')+':'+mm+':'+ss;
  document.getElementById('dateText').textContent=now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

function generateCalendar(){
  const now=new Date();
  const year=now.getFullYear(),month=now.getMonth(),today=now.getDate();
  document.getElementById('calMonth').textContent=now.toLocaleString('default',{month:'long'});
  document.getElementById('calYear').textContent=year;
  const dates=document.getElementById('dates');
  dates.innerHTML='';
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const prevDays=new Date(year,month,0).getDate();
  for(let i=0;i<firstDay;i++){
    const d=document.createElement('div');
    d.className='date-box other-month';
    d.textContent=prevDays-firstDay+1+i;
    dates.appendChild(d);
  }
  for(let d=1;d<=daysInMonth;d++){
    const div=document.createElement('div');
    const dow=new Date(year,month,d).getDay();
    div.className='date-box'+(d===today?' today':'')+(dow===0||dow===6?' weekend':'');
    div.textContent=d;
    dates.appendChild(div);
  }
  const remaining=42-firstDay-daysInMonth;
  for(let i=1;i<=remaining;i++){
    const d=document.createElement('div');
    d.className='date-box other-month';
    d.textContent=i;
    dates.appendChild(d);
  }
}

updateClock();
generateCalendar();
setInterval(updateClock,1000);
</script>
