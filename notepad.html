<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Notepad</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Inter, sans-serif;
    background: transparent;
    padding:8px;
    color:#37352f;
}

/* MAIN CARD */

.notepad{
    width:100%;
    height:520px;
    background:#ffffff;
    border:1px solid #ececec;
    border-radius:18px;
    overflow:hidden;
    display:flex;
    flex-direction:column;
}

/* HEADER */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:14px 18px;
    border-bottom:1px solid #f3f3f3;
    background:#ffffff;
}

.title{
    font-size:14px;
    font-weight:700;
    letter-spacing:2px;
    color:#2f3437;
}

.header-buttons{
    display:flex;
    gap:10px;
}

.btn{
    border:1px solid #ececec;
    background:#ffffff;
    border-radius:12px;
    padding:8px 14px;
    font-size:12px;
    cursor:pointer;
    color:#555;
    transition:0.2s;
    font-weight:500;
}

.btn:hover{
    background:#f7f7f7;
}

/* TOOLBAR */

.toolbar{
    display:flex;
    align-items:center;
    gap:6px;
    padding:10px 16px;
    border-bottom:1px solid #f5f5f5;
    background:#fcfcfc;
}

.tool{
    border:none;
    background:transparent;
    color:#6b7280;
    padding:6px 8px;
    border-radius:8px;
    cursor:pointer;
    font-size:14px;
    transition:0.2s;
}

.tool:hover{
    background:#f1f3f5;
    color:#2f3437;
}

.divider{
    width:1px;
    height:18px;
    background:#ececec;
    margin:0 4px;
}

/* EDITOR */

.editor{
    flex:1;
    padding:18px;
    outline:none;
    overflow:auto;
    font-size:15px;
    line-height:1.7;
    color:#37352f;
}

.editor:empty:before{
    content:"Write your notes here...";
    color:#9ca3af;
}

/* FOOTER */

.footer{
    display:flex;
    justify-content:flex-end;
    align-items:center;
    padding:10px 16px;
    border-top:1px solid #f5f5f5;
    font-size:11px;
    letter-spacing:1px;
    color:#9ca3af;
    background:#ffffff;
}

.dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:#22c55e;
    margin-left:6px;
}
</style>
</head>

<body>

<div class="notepad">

    <!-- HEADER -->
    <div class="header">
        <div class="title">NOTEPAD</div>

        <div class="header-buttons">
            <button class="btn" onclick="clearNotes()">CLEAR</button>
            <button class="btn" onclick="copyNotes()">COPY</button>
        </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">

        <button class="tool" onclick="format('bold')"><b>B</b></button>

        <button class="tool" onclick="format('italic')"><i>I</i></button>

        <button class="tool" onclick="format('underline')"><u>U</u></button>

        <div class="divider"></div>

        <button class="tool" onclick="format('insertUnorderedList')">• List</button>

        <button class="tool" onclick="format('insertOrderedList')">1. List</button>

    </div>

    <!-- EDITOR -->
    <div
        id="editor"
        class="editor"
        contenteditable="true"
    ></div>

    <!-- FOOTER -->
    <div class="footer">
        AUTO-SAVE
        <div class="dot"></div>
    </div>

</div>

<script>
const editor = document.getElementById('editor');

/* LOAD SAVED NOTES */

window.onload = () => {
    const saved = localStorage.getItem('notepad-content');

    if(saved){
        editor.innerHTML = saved;
    }
};

/* AUTO SAVE */

editor.addEventListener('input', () => {
    localStorage.setItem(
        'notepad-content',
        editor.innerHTML
    );
});

/* FORMATTING */

function format(command){
    document.execCommand(command, false, null);
}

/* CLEAR */

function clearNotes(){

    editor.innerHTML = '';

    localStorage.removeItem('notepad-content');
}

/* COPY */

function copyNotes(){

    navigator.clipboard.writeText(editor.innerText);

    alert('Copied');
}
</script>

</body>
</html>
