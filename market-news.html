<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Market News</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    background:#ffffff;

    font-family:'Space Grotesk',sans-serif;

    overflow:hidden;
}

body{
    padding:16px;
}

.widget{

    width:100%;
    height:100%;

    background:#ffffff;

    border:1px solid #ececec;

    border-radius:28px;

    padding:22px;

    display:flex;
    flex-direction:column;

    overflow:hidden;
}

.top{

    display:flex;

    align-items:center;

    gap:12px;

    margin-bottom:18px;
}

.title{

    font-size:18px;

    font-weight:700;

    color:#111;
}

.refresh-btn {

    width: 28px;
    height: 28px;

    border-radius: 50%;

    border: 1px solid #e5e5e5;

    background: #ffffff;

    display: flex;

    align-items: center;

    justify-content: center;

    cursor: pointer;

    transition: all 0.2s ease;

    font-size: 12px;

    color: #555;

    padding: 0;
}

.refresh-btn:hover {

    background: #f5f5f5;

    transform: rotate(90deg);
}

.live{

    display:flex;

    align-items:center;

    gap:8px;

    font-size:11px;

    font-weight:700;

    color:#777;

    letter-spacing:1px;

    margin-left:auto;
}

.dot{

    width:8px;
    height:8px;

    border-radius:50%;

    background:#22c55e;
}

.news-list{

    flex:1;

    overflow-y:auto;

    display:flex;

    flex-direction:column;

    gap:12px;

    padding-right:4px;
}

.news-card{

    text-decoration:none;

    border:1px solid #f0f0f0;

    border-radius:18px;

    padding:16px;

    transition:0.2s ease;

    background:#fff;

    color:#111;
}

.news-card:hover{

    transform:translateY(-2px);

    border-color:#dcdcdc;
}

.news-title{

    font-size:14px;

    font-weight:700;

    line-height:1.5;

    margin-bottom:8px;
}

.news-meta{

    display:flex;

    justify-content:space-between;

    align-items:center;

    font-size:11px;

    color:#888;
}

.source{

    font-weight:600;

    text-transform:capitalize;
}

.empty{

    color:#ff4444;

    font-size:13px;
}

.news-list::-webkit-scrollbar{
    width:4px;
}

.news-list::-webkit-scrollbar-thumb{
    background:#d8d8d8;
    border-radius:10px;
}

</style>
</head>
<body>

<div class="widget">

    <div class="top">

        <div class="title">
            Market News
        </div>

        <button
            class="refresh-btn"
            id="refreshBtn">

            ↻

        </button>

        <div class="live">

            <div class="dot"></div>

            <div>LIVE</div>

        </div>

    </div>

    <div class="news-list" id="newsList">

        <div class="empty">
            Loading news...
        </div>

    </div>

</div>

<script>

const API = "/api/news";

function isRecent(dateString){

    const now = new Date();

    const newsDate = new Date(dateString);

    if(isNaN(newsDate.getTime())){
        return true;
    }

    const diff =
    (now - newsDate) /
    (1000 * 60 * 60 * 24);

    return diff <= 7;
}

function formatDate(dateString){

    const d = new Date(dateString);

    if(isNaN(d.getTime())){
        return "Recent";
    }

    return d.toLocaleString('en-IN',{

        day:'2-digit',
        month:'short',

        hour:'2-digit',
        minute:'2-digit'
    });
}

async function loadNews(){

    try{

        const response =
        await fetch(
            API + '?t=' + Date.now()
        );

        const data =
        await response.json();

        const newsList =
        document.getElementById('newsList');

        newsList.innerHTML = '';

        if(!data.items){

            newsList.innerHTML =
            '<div class="empty">No news available</div>';

            return;
        }

        const uniqueTitles = new Set();

        const filteredNews =
        data.items

        .filter(item => {

            if(!item.title) return false;

            if(uniqueTitles.has(item.title))
                return false;

            uniqueTitles.add(item.title);

            return isRecent(item.pubDate);
        })

        .sort((a,b) => {

            const dateA =
            new Date(a.pubDate).getTime();

            const dateB =
            new Date(b.pubDate).getTime();

            return dateB - dateA;
        })

        .slice(0,15);

        if(filteredNews.length === 0){

            newsList.innerHTML =
            '<div class="empty">No recent market news found</div>';

            return;
        }

        filteredNews.forEach(item => {

            const card =
            document.createElement('a');

            card.href = item.link;

            card.target = '_blank';

            card.className = 'news-card';

            let source = "Market";

            try{

                const url =
                new URL(item.link);

                source =
                url.hostname
                .replace("www.","")
                .split(".")[0];

            } catch {}

            card.innerHTML = `

                <div class="news-title">
                    ${item.title}
                </div>

                <div class="news-meta">

                    <div class="source">
                        ${source}
                    </div>

                    <div>
                        ${formatDate(item.pubDate)}
                    </div>

                </div>

            `;

            newsList.appendChild(card);
        });

    }

    catch(error){

        console.error(error);

        document.getElementById('newsList').innerHTML =
        '<div class="empty">Unable to load news</div>';
    }
}

loadNews();

setInterval(loadNews,300000);

document
.getElementById('refreshBtn')
.addEventListener('click', async () => {

    const btn =
    document.getElementById('refreshBtn');

    btn.style.opacity = '0.5';

    await loadNews();

    setTimeout(() => {

        btn.style.opacity = '1';

    }, 300);
});

</script>

</body>
</html>
