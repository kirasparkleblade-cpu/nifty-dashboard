<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Events</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:transparent; color:#111; font-family:'DM Sans',sans-serif; height:100%; overflow:hidden; }
  .wrap { width:100%; height:100vh; display:flex; flex-direction:column; }

  .hdr {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 14px; background:#fff;
    border:1px solid #e8e8e8; border-radius:10px 10px 0 0; border-bottom:none;
    flex-shrink:0;
  }
  .hdr-left { display:flex; align-items:center; gap:8px; }
  .live-ring { width:7px; height:7px; border-radius:50%; background:#22c55e; animation:ring 2s ease-in-out infinite; }
  @keyframes ring {
    0%  { box-shadow:0 0 0 0 rgba(34,197,94,.5); }
    70% { box-shadow:0 0 0 5px rgba(34,197,94,0); }
    100%{ box-shadow:0 0 0 0 rgba(34,197,94,0); }
  }
  .hdr-title { font-size:11px; font-weight:600; letter-spacing:.7px; text-transform:uppercase; color:#111; }
  .hdr-right { display:flex; align-items:center; gap:6px; }
  .data-badge {
    font-size:9px; font-weight:500; padding:2px 7px; border-radius:999px;
    background:#f0fdf4; border:1px solid #bbf7d0; color:#15803d;
  }

  .meta {
    display:flex; align-items:center; justify-content:space-between;
    padding:4px 14px; background:#f9f9f9;
    border:1px solid #e8e8e8; border-bottom:none; flex-shrink:0;
  }
  .meta-txt  { font-size:10px; color:#aaa; font-family:'DM Mono',monospace; }
  .meta-right { font-size:9px; font-weight:500; padding:2px 7px; border-radius:999px; background:#f0f0f0; border:1px solid #e0e0e0; color:#888; }

  .events-wrap {
    background:#f9f9f9; border:1px solid #e8e8e8; border-radius:0 0 10px 10px;
    flex:1; overflow:hidden; display:flex; flex-direction:column;
  }
  .events { display:flex; flex-direction:column; flex:1; overflow-y:auto; padding:6px; gap:5px; }
  .events::-webkit-scrollbar { width:3px; }
  .events::-webkit-scrollbar-thumb { background:#ddd; border-radius:99px; }

  .card {
    background:#fff; border:1px solid #ebebeb; border-radius:10px;
    overflow:hidden; transition:box-shadow .15s,border-color .15s; flex-shrink:0;
  }
  .card:hover { box-shadow:0 2px 8px rgba(0,0,0,.06); border-color:#d8d8d8; }
  .card-top { display:flex; align-items:center; gap:10px; padding:10px 12px; }

  .cat-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .ci-rbi{background:#fef3e2;} .ci-fo{background:#ede9fe;}
  .ci-budget{background:#dcfce7;} .ci-earnings{background:#dbeafe;}
  .ci-global{background:#fce7f3;} .ci-data{background:#ffedd5;}
  .ci-other{background:#f3f4f6;}

  .card-info { flex:1; min-width:0; }
  .card-title { font-size:12px; font-weight:500; color:#111; line-height:1.35; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-sub { display:flex; align-items:center; gap:5px; margin-top:3px; }
  .card-date { font-size:10px; color:#888; font-family:'DM Mono',monospace; }
  .today-dot { width:5px; height:5px; border-radius:50%; background:#e24b4a; flex-shrink:0; animation:blink .9s ease-in-out infinite; }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

  .cat-pill { font-size:9px; font-weight:500; padding:1px 6px; border-radius:999px; }
  .cp-rbi{background:#fef3e2;color:#92400e;} .cp-fo{background:#ede9fe;color:#4c1d95;}
  .cp-budget{background:#dcfce7;color:#14532d;} .cp-earnings{background:#dbeafe;color:#1e3a8a;}
  .cp-global{background:#fce7f3;color:#831843;} .cp-data{background:#ffedd5;color:#7c2d12;}
  .cp-other{background:#f3f4f6;color:#374151;}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-left">
      <div class="live-ring"></div>
      <div class="hdr-title">Market Events</div>
    </div>
    <div class="hdr-right">
      <div class="data-badge">no API · offline</div>
    </div>
  </div>
  <div class="meta">
    <div class="meta-txt" id="metaDate">—</div>
    <div class="meta-right" id="evCount">—</div>
  </div>
  <div id="content" style="flex:1;display:flex;flex-direction:column;">
    <div class="events-wrap"><div class="events" id="evList"></div></div>
  </div>
</div>
<script>
// ─────────────────────────────────────────────────────────────────
//  STATIC EVENT DATABASE  — no API calls, no quota, always works
//  Update this list every quarter (copy-paste new dates below)
// ─────────────────────────────────────────────────────────────────
const EVENTS = [
  // ── F&O Weekly Expiries (every Thursday) ──────────────────────
  {date:'2026-06-05', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-06-12', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-06-19', title:'NSE Monthly F&O Expiry',         category:'F&O'},
  {date:'2026-06-26', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-07-03', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-07-10', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-07-17', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-07-23', title:'NSE Monthly F&O Expiry',         category:'F&O'},
  {date:'2026-07-30', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-08-07', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-08-13', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-08-20', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-08-27', title:'NSE Monthly F&O Expiry',         category:'F&O'},
  {date:'2026-09-03', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-09-10', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-09-17', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-09-24', title:'NSE Monthly F&O Expiry',         category:'F&O'},
  {date:'2026-10-01', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-10-08', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-10-15', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-10-22', title:'NSE Monthly F&O Expiry',         category:'F&O'},
  {date:'2026-10-29', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-11-05', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-11-12', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-11-19', title:'NSE Weekly F&O Expiry',          category:'F&O'},
  {date:'2026-11-26', title:'NSE Monthly F&O Expiry',         category:'F&O'},

  // ── RBI MPC Meetings ──────────────────────────────────────────
  {date:'2026-06-06', title:'RBI MPC Decision',               category:'RBI'},
  {date:'2026-08-07', title:'RBI MPC Decision',               category:'RBI'},
  {date:'2026-10-09', title:'RBI MPC Decision',               category:'RBI'},
  {date:'2026-12-04', title:'RBI MPC Decision',               category:'RBI'},

  // ── India Macro Data ──────────────────────────────────────────
  {date:'2026-06-12', title:'India CPI Inflation (May)',      category:'Data'},
  {date:'2026-06-13', title:'India WPI Inflation (May)',      category:'Data'},
  {date:'2026-06-30', title:'India GDP Q4 FY26',              category:'Data'},
  {date:'2026-07-14', title:'India CPI Inflation (Jun)',      category:'Data'},
  {date:'2026-07-15', title:'India WPI Inflation (Jun)',      category:'Data'},
  {date:'2026-07-31', title:'India IIP Data (May)',           category:'Data'},
  {date:'2026-08-13', title:'India CPI Inflation (Jul)',      category:'Data'},
  {date:'2026-08-14', title:'India WPI Inflation (Jul)',      category:'Data'},
  {date:'2026-09-12', title:'India CPI Inflation (Aug)',      category:'Data'},
  {date:'2026-09-15', title:'India WPI Inflation (Aug)',      category:'Data'},
  {date:'2026-09-30', title:'India GDP Q1 FY27',              category:'Data'},
  {date:'2026-10-14', title:'India CPI Inflation (Sep)',      category:'Data'},
  {date:'2026-10-15', title:'India WPI Inflation (Sep)',      category:'Data'},
  {date:'2026-11-13', title:'India CPI Inflation (Oct)',      category:'Data'},
  {date:'2026-11-14', title:'India WPI Inflation (Oct)',      category:'Data'},

  // ── US Fed FOMC ───────────────────────────────────────────────
  {date:'2026-06-18', title:'US Fed FOMC Decision',           category:'Global'},
  {date:'2026-07-29', title:'US Fed FOMC Decision',           category:'Global'},
  {date:'2026-09-16', title:'US Fed FOMC Decision',           category:'Global'},
  {date:'2026-11-04', title:'US Fed FOMC Decision',           category:'Global'},
  {date:'2026-12-16', title:'US Fed FOMC Decision',           category:'Global'},

  // ── Major Nifty50 Earnings (Q4 FY26 season) ──────────────────
  {date:'2026-06-05', title:'Infosys Q4 Results',             category:'Earnings'},
  {date:'2026-06-10', title:'TCS Q4 Results',                 category:'Earnings'},
  {date:'2026-06-12', title:'Wipro Q4 Results',               category:'Earnings'},
  {date:'2026-06-18', title:'HDFC Bank Q4 Results',           category:'Earnings'},
  {date:'2026-06-20', title:'Reliance Industries Q4 Results', category:'Earnings'},
  {date:'2026-06-23', title:'ICICI Bank Q4 Results',          category:'Earnings'},
  {date:'2026-06-25', title:'SBI Q4 Results',                 category:'Earnings'},
  {date:'2026-07-08', title:'HUL Q1 FY27 Results',            category:'Earnings'},
  {date:'2026-07-15', title:'ITC Q1 FY27 Results',            category:'Earnings'},

  // ── India Budget / Policy ─────────────────────────────────────
  {date:'2026-07-01', title:'Union Budget FY27 Presentation', category:'Budget'},
];

// ─────────────────────────────────────────────────────────────────
const CAT = {
  'RBI'     :{icon:'🏦',ci:'ci-rbi',     cp:'cp-rbi'},
  'F&O'     :{icon:'📊',ci:'ci-fo',      cp:'cp-fo'},
  'Budget'  :{icon:'💰',ci:'ci-budget',  cp:'cp-budget'},
  'Earnings':{icon:'📈',ci:'ci-earnings',cp:'cp-earnings'},
  'Global'  :{icon:'🌍',ci:'ci-global',  cp:'cp-global'},
  'Data'    :{icon:'📉',ci:'ci-data',    cp:'cp-data'},
  'Other'   :{icon:'📅',ci:'ci-other',   cp:'cp-other'},
};

function todayIST() {
  const now = new Date();
  const ist = new Date(now.getTime() + 5.5*60*60*1000);
  return ist.toISOString().split('T')[0];
}

function render() {
  const today = todayIST();
  const upcoming = EVENTS
    .filter(e => e.date >= today)
    .sort((a,b) => a.date > b.date ? 1 : -1);

  // Meta bar
  document.getElementById('metaDate').textContent =
    'As of ' + new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
  document.getElementById('evCount').textContent = upcoming.length + ' events ahead';

  const list = document.getElementById('evList');
  list.innerHTML = '';

  for (const ev of upcoming) {
    const cat    = CAT[ev.category] || CAT['Other'];
    const isToday = ev.date === today;
    const dl     = new Date(ev.date+'T00:00:00')
      .toLocaleDateString('en-IN',{day:'numeric',month:'short'});

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        <div class="cat-icon ${cat.ci}">${cat.icon}</div>
        <div class="card-info">
          <div class="card-title">${ev.title}</div>
          <div class="card-sub">
            ${isToday ? '<span class="today-dot"></span>' : ''}
            <span class="card-date">${isToday ? 'Today' : dl}</span>
            <span class="cat-pill ${cat.cp}">${ev.category}</span>
          </div>
        </div>
      </div>`;
    list.appendChild(card);
  }

  if (!upcoming.length) {
    list.innerHTML = '<div style="padding:30px;text-align:center;color:#aaa;font-size:12px;">No upcoming events in database</div>';
  }
}

render();
// Re-render at midnight IST to refresh "today" detection
const now = new Date();
const ist = new Date(now.getTime() + 5.5*60*60*1000);
const msTillMidnight = (24*60*60*1000) - (ist.getHours()*3600 + ist.getMinutes()*60 + ist.getSeconds())*1000 + 500;
setTimeout(() => { render(); setInterval(render, 24*60*60*1000); }, msTillMidnight);
</script>
</body>
</html>
