<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Events</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:transparent; color:#111; font-family:'DM Sans',sans-serif; width:100%; height:100%; overflow:hidden; }
  .wrap { width:100%; height:100%; display:flex; flex-direction:column; overflow:hidden; }

  .hdr {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 14px; background:#fff;
    border:1px solid #e8e8e8; border-radius:10px 10px 0 0; border-bottom:none;
    flex-shrink:0;
  }
  .hdr-left { display:flex; align-items:center; gap:8px; }
  .live-ring { width:7px; height:7px; border-radius:50%; background:#22c55e; animation:ring 2s ease-in-out infinite; }
  @keyframes ring {
    0%  { box-shadow:0 0 0 0 rgba(34,197,94,.5); }
    70% { box-shadow:0 0 0 5px rgba(34,197,94,0); }
    100%{ box-shadow:0 0 0 0 rgba(34,197,94,0); }
  }
  .hdr-title { font-size:11px; font-weight:600; letter-spacing:.7px; text-transform:uppercase; color:#111; }
  .hdr-right { display:flex; align-items:center; gap:6px; }
  .ai-badge {
    font-size:9px; font-weight:500; padding:2px 7px; border-radius:999px;
    background:#ede9fe; border:1px solid #ddd6fe; color:#5b21b6;
  }

  .meta {
    display:flex; align-items:center; justify-content:space-between;
    padding:4px 14px; background:#f9f9f9;
    border:1px solid #e8e8e8; border-bottom:none; flex-shrink:0;
  }
  .meta-txt  { font-size:10px; color:#aaa; font-family:'DM Mono',monospace; }
  .meta-right { font-size:9px; font-weight:500; padding:2px 7px; border-radius:999px; background:#f0f0f0; border:1px solid #e0e0e0; color:#888; }

  .events-wrap {
    background:#f9f9f9; border:1px solid #e8e8e8; border-radius:0 0 10px 10px;
    flex:1; min-height:0; overflow:hidden; display:flex; flex-direction:column;
  }
  .events { display:flex; flex-direction:column; flex:1; min-height:0; overflow-y:auto; padding:6px; gap:5px; }
  .events::-webkit-scrollbar { width:3px; }
  .events::-webkit-scrollbar-thumb { background:#ddd; border-radius:99px; }

  .card {
    background:#fff; border:1px solid #ebebeb; border-radius:10px;
    transition:box-shadow .15s,border-color .15s; flex-shrink:0;
  }
  .card:hover { box-shadow:0 2px 8px rgba(0,0,0,.06); border-color:#d8d8d8; }
  .card-top { display:flex; align-items:center; gap:10px; padding:10px 12px; }

  .cat-icon { width:28px; height:28px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .ci-rbi{background:#fef3e2;} .ci-fo{background:#ede9fe;}
  .ci-budget{background:#dcfce7;} .ci-earnings{background:#dbeafe;}
  .ci-global{background:#fce7f3;} .ci-data{background:#ffedd5;}
  .ci-other{background:#f3f4f6;}

  .card-info { flex:1; min-width:0; }
  .card-title { font-size:12px; font-weight:500; color:#111; line-height:1.35; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-sub { display:flex; align-items:center; gap:5px; margin-top:3px; }
  .card-date { font-size:10px; color:#888; font-family:'DM Mono',monospace; }
  .today-dot { width:5px; height:5px; border-radius:50%; background:#e24b4a; flex-shrink:0; animation:blink .9s ease-in-out infinite; }
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}

  .cat-pill { font-size:9px; font-weight:500; padding:1px 6px; border-radius:999px; }
  .cp-rbi{background:#fef3e2;color:#92400e;} .cp-fo{background:#ede9fe;color:#4c1d95;}
  .cp-budget{background:#dcfce7;color:#14532d;} .cp-earnings{background:#dbeafe;color:#1e3a8a;}
  .cp-global{background:#fce7f3;color:#831843;} .cp-data{background:#ffedd5;color:#7c2d12;}
  .cp-other{background:#f3f4f6;color:#374151;}

  .state-box {
    padding:30px 20px; text-align:center; background:#f9f9f9;
    border:1px solid #e8e8e8; border-radius:0 0 10px 10px; flex:1;
  }
  .state-icon{font-size:24px;margin-bottom:8px;}
  .state-title{font-size:12px;font-weight:500;color:#111;margin-bottom:3px;}
  .state-sub{font-size:10px;color:#aaa;line-height:1.6;}
  .dots{display:flex;justify-content:center;gap:5px;margin-top:10px;}
  .dots span{width:5px;height:5px;border-radius:50%;background:#ccc;animation:dp 1.2s ease-in-out infinite;}
  .dots span:nth-child(2){animation-delay:.2s;}
  .dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dp{0%,100%{opacity:.2;transform:scale(.7);}50%{opacity:1;transform:scale(1);}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-left">
      <div class="live-ring"></div>
      <div class="hdr-title">Market Events</div>
    </div>
    <div class="hdr-right">
      <div class="ai-badge">AI · Gemini</div>
    </div>
  </div>
  <div class="meta" id="metaRow" style="display:none;">
    <div class="meta-txt" id="metaDate">—</div>
    <div class="meta-right" id="evCount">—</div>
  </div>
  <div id="content" style="flex:1;min-height:0;display:flex;flex-direction:column;">
    <div class="state-box">
      <div class="state-icon">⏳</div>
      <div class="state-title">Loading events…</div>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>
</div>

<script>
// ── IMPORTANT: Replace with your actual Google Sheet ID ───────────────────
// Get it from the sheet URL:
// https://docs.google.com/spreadsheets/d/SHEET_ID_IS_HERE/edit
const SHEET_ID  = 'http://10f5iljbnetdjp73srjx_eduhxhzmynqif1trkarakfo/edit?usp=sharing';
const SHEET_TAB = 'Events'; // name of the tab inside your sheet

// Google Sheets public CSV export URL (no API key needed — sheet must be public)
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_TAB)}`;

const CAT = {
  'RBI'     :{icon:'🏦',ci:'ci-rbi',     cp:'cp-rbi'},
  'F&O'     :{icon:'📊',ci:'ci-fo',      cp:'cp-fo'},
  'Budget'  :{icon:'💰',ci:'ci-budget',  cp:'cp-budget'},
  'Earnings':{icon:'📈',ci:'ci-earnings',cp:'cp-earnings'},
  'Global'  :{icon:'🌍',ci:'ci-global',  cp:'cp-global'},
  'Data'    :{icon:'📉',ci:'ci-data',    cp:'cp-data'},
  'Other'   :{icon:'📅',ci:'ci-other',   cp:'cp-other'},
};

// ── IST helpers ───────────────────────────────────────────────────────────
function todayIST() {
  return new Date(Date.now() + 5.5*60*60*1000).toISOString().split('T')[0];
}

// ── Parse CSV from Google Sheets ──────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  // Skip header row, parse data rows
  // Google Sheets CSV wraps values in quotes
  return lines.slice(1).map(line => {
    const cols = line.match(/(".*?"|[^,]+)(?=,|$)/g) || [];
    const clean = cols.map(c => c.replace(/^"|"$/g, '').trim());
    return { date: clean[0], title: clean[1], category: clean[2] };
  }).filter(e => e.date && /^\d{4}-\d{2}-\d{2}$/.test(e.date));
}

// ── Render ────────────────────────────────────────────────────────────────
function renderEvents(events, updatedAt) {
  const today    = todayIST();
  const upcoming = events
    .filter(e => e.date >= today)
    .sort((a, b) => a.date > b.date ? 1 : -1);

  const timeStr = updatedAt
    ? new Date(updatedAt).toLocaleTimeString('en-IN', {day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'})
    : '—';
  document.getElementById('metaDate').textContent = 'AI updated ' + timeStr;
  document.getElementById('evCount').textContent  = upcoming.length + ' events ahead';
  document.getElementById('metaRow').style.display = 'flex';

  if (!upcoming.length) {
    document.getElementById('content').innerHTML =
      `<div class="state-box"><div class="state-icon">✅</div><div class="state-title">No upcoming events</div></div>`;
    return;
  }

  let html = '<div class="events-wrap"><div class="events">';
  for (const ev of upcoming) {
    const cat     = CAT[ev.category] || CAT['Other'];
    const isToday = ev.date === today;
    const dl      = new Date(ev.date + 'T00:00:00')
      .toLocaleDateString('en-IN', {day:'numeric', month:'short'});
    html += `<div class="card">
      <div class="card-top">
        <div class="cat-icon ${cat.ci}">${cat.icon}</div>
        <div class="card-info">
          <div class="card-title">${ev.title}</div>
          <div class="card-sub">
            ${isToday ? '<span class="today-dot"></span>' : ''}
            <span class="card-date">${isToday ? 'Today' : dl}</span>
            <span class="cat-pill ${cat.cp}">${ev.category}</span>
          </div>
        </div>
      </div>
    </div>`;
  }
  html += '</div></div>';
  document.getElementById('content').innerHTML = html;
}

function showError(msg) {
  document.getElementById('content').innerHTML =
    `<div class="state-box">
       <div class="state-icon">⚠️</div>
       <div class="state-title">Could not load</div>
       <div class="state-sub">${msg}</div>
     </div>`;
}

// ── Fetch from Google Sheet CSV ───────────────────────────────────────────
async function loadFromSheet() {
  try {
    const res = await fetch(CSV_URL + '&t=' + Date.now()); // cache bust
    if (!res.ok) throw new Error('Sheet fetch failed: HTTP ' + res.status);
    const text   = await res.text();
    const events = parseCSV(text);
    if (!events.length) throw new Error('Sheet is empty — cron may not have run yet');

    // updatedAt comes from column 4 of first data row
    const firstLine = text.trim().split('\n')[1] || '';
    const cols      = firstLine.match(/(".*?"|[^,]+)(?=,|$)/g) || [];
    const updatedAt = cols[3] ? cols[3].replace(/^"|"$/g, '').trim() : null;

    renderEvents(events, updatedAt);
  } catch (err) {
    showError(err.message + '<br><br>Make sure the sheet is public and the SHEET_ID is set.');
  }
}

loadFromSheet();
</script>
</body>
</html>
