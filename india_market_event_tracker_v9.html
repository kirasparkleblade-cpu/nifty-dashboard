<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Events</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { background:transparent; color:#111; font-family:'DM Sans',sans-serif; height:100%; overflow:hidden; }
  .wrap { width:100%; height:100vh; display:flex; flex-direction:column; }

  .hdr {
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 14px; background:#fff;
    border:1px solid #e8e8e8; border-radius:10px 10px 0 0; border-bottom:none;
    flex-shrink:0;
  }
  .hdr-left { display:flex; align-items:center; gap:8px; }
  .live-ring {
    width:7px; height:7px; border-radius:50%; background:#22c55e;
    animation:ring 2s ease-in-out infinite;
  }
  @keyframes ring {
    0%  { box-shadow:0 0 0 0 rgba(34,197,94,.5); }
    70% { box-shadow:0 0 0 5px rgba(34,197,94,0); }
    100%{ box-shadow:0 0 0 0 rgba(34,197,94,0); }
  }
  .hdr-title { font-size:11px; font-weight:600; letter-spacing:.7px; text-transform:uppercase; color:#111; }
  .hdr-right { display:flex; align-items:center; gap:6px; }
  .refresh-cd { font-family:'DM Mono',monospace; font-size:10px; color:#aaa; }
  .stale-badge {
    font-size:9px; font-weight:500; padding:2px 6px; border-radius:999px;
    background:#fff7ed; border:1px solid #fed7aa; color:#c2410c;
    display:none;
  }

  .meta {
    display:flex; align-items:center; justify-content:space-between;
    padding:4px 14px; background:#f9f9f9;
    border:1px solid #e8e8e8; border-bottom:none; flex-shrink:0;
  }
  .meta-txt  { font-size:10px; color:#aaa; font-family:'DM Mono',monospace; }
  .model-badge {
    font-size:9px; font-weight:500; padding:2px 7px; border-radius:999px;
    background:#f0f0f0; border:1px solid #e0e0e0; color:#888;
  }

  .events-wrap {
    background:#f9f9f9; border:1px solid #e8e8e8; border-radius:0 0 10px 10px;
    flex:1; overflow:hidden; display:flex; flex-direction:column;
  }
  .events {
    display:flex; flex-direction:column; flex:1; overflow-y:auto;
    padding:6px; gap:5px;
  }
  .events::-webkit-scrollbar { width:3px; }
  .events::-webkit-scrollbar-thumb { background:#ddd; border-radius:99px; }

  .card {
    background:#fff; border:1px solid #ebebeb; border-radius:10px;
    overflow:hidden; transition:box-shadow .15s,border-color .15s; flex-shrink:0;
  }
  .card:hover { box-shadow:0 2px 8px rgba(0,0,0,.06); border-color:#d8d8d8; }
  .card-top { display:flex; align-items:center; gap:10px; padding:10px 12px; }

  .cat-icon {
    width:28px; height:28px; border-radius:8px;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; flex-shrink:0;
  }
  .ci-rbi{background:#fef3e2;} .ci-fo{background:#ede9fe;}
  .ci-budget{background:#dcfce7;} .ci-earnings{background:#dbeafe;}
  .ci-global{background:#fce7f3;} .ci-data{background:#ffedd5;}
  .ci-other{background:#f3f4f6;}

  .card-info { flex:1; min-width:0; }
  .card-title { font-size:12px; font-weight:500; color:#111; line-height:1.35; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-sub { display:flex; align-items:center; gap:5px; margin-top:3px; }
  .card-date { font-size:10px; color:#888; font-family:'DM Mono',monospace; }

  .cat-pill { font-size:9px; font-weight:500; padding:1px 6px; border-radius:999px; }
  .cp-rbi{background:#fef3e2;color:#92400e;} .cp-fo{background:#ede9fe;color:#4c1d95;}
  .cp-budget{background:#dcfce7;color:#14532d;} .cp-earnings{background:#dbeafe;color:#1e3a8a;}
  .cp-global{background:#fce7f3;color:#831843;} .cp-data{background:#ffedd5;color:#7c2d12;}
  .cp-other{background:#f3f4f6;color:#374151;}

  .state-box {
    padding:36px 20px; text-align:center; background:#f9f9f9;
    border:1px solid #e8e8e8; border-radius:0 0 10px 10px; flex:1;
  }
  .state-icon{font-size:26px;margin-bottom:10px;}
  .state-title{font-size:13px;font-weight:500;color:#111;margin-bottom:4px;}
  .state-sub{font-size:11px;color:#888;line-height:1.6;}
  .dots{display:flex;justify-content:center;gap:5px;margin-top:10px;}
  .dots span{width:5px;height:5px;border-radius:50%;background:#ccc;animation:dp 1.2s ease-in-out infinite;}
  .dots span:nth-child(2){animation-delay:.2s;}
  .dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dp{0%,100%{opacity:.2;transform:scale(.7);}50%{opacity:1;transform:scale(1);}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-left">
      <div class="live-ring"></div>
      <div class="hdr-title">Market Events</div>
    </div>
    <div class="hdr-right">
      <div class="stale-badge" id="staleBadge">cached</div>
      <div class="refresh-cd" id="refreshCd"></div>
    </div>
  </div>
  <div class="meta" id="metaRow" style="display:none;">
    <div class="meta-txt" id="metaDate">—</div>
    <div class="model-badge" id="modelUsed">Gemini</div>
  </div>
  <div id="content" style="flex:1;display:flex;flex-direction:column;">
    <div class="state-box">
      <div class="state-icon">⏳</div>
      <div class="state-title">Loading events…</div>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>
</div>
<script>
const BASE_URL   = '';
const MODELS_EP  = BASE_URL + '/api/gemini-models';
const CONTENT_EP = BASE_URL + '/api/gemini';
const CACHE_KEY  = 'mkt_v9_day';

// Refresh once per day at 06:00 IST (00:30 UTC)
const REFRESH_HOUR_IST = 6;

// Model preference: put cheaper/higher-quota models FIRST
const PREFERRED = [
  'gemini-1.5-flash',        // highest free quota (1500/day)
  'gemini-2.0-flash-lite',   // 1500/day
  'gemini-2.0-flash',        // 1500/day
  'gemini-1.5-pro',
  'gemini-2.5-flash-lite',
  'gemini-2.5-flash',
  'gemini-2.5-pro',
];

const CAT = {
  'RBI'     :{icon:'🏦',ci:'ci-rbi',     cp:'cp-rbi'},
  'F&O'     :{icon:'📊',ci:'ci-fo',      cp:'cp-fo'},
  'Budget'  :{icon:'💰',ci:'ci-budget',  cp:'cp-budget'},
  'Earnings':{icon:'📈',ci:'ci-earnings',cp:'cp-earnings'},
  'Global'  :{icon:'🌍',ci:'ci-global',  cp:'cp-global'},
  'Data'    :{icon:'📉',ci:'ci-data',    cp:'cp-data'},
  'Other'   :{icon:'📅',ci:'ci-other',   cp:'cp-other'},
};

let usedModel = '';

/* ── IST date helpers ────────────────────────────────────────────────────── */
function nowIST() {
  // IST = UTC+5:30
  const now = new Date();
  return new Date(now.getTime() + (5.5 * 60 * 60 * 1000));
}

/** Returns "YYYY-MM-DD" in IST */
function todayIST() {
  return nowIST().toISOString().split('T')[0];
}

/** Next 06:00 IST as UTC epoch ms */
function next6amIST() {
  const ist = nowIST();
  const target = new Date(ist);
  target.setHours(REFRESH_HOUR_IST, 0, 0, 0);
  if (ist.getHours() >= REFRESH_HOUR_IST) {
    target.setDate(target.getDate() + 1);
  }
  // Convert back to UTC ms
  return target.getTime() - (5.5 * 60 * 60 * 1000);
}

function p2(n){ return String(n).padStart(2,'0'); }

/* ── Header countdown to next 6 AM refresh ──────────────────────────────── */
setInterval(() => {
  const rem = next6amIST() - Date.now();
  const el  = document.getElementById('refreshCd');
  if (!el) return;
  if (rem > 0) {
    const h = Math.floor(rem / 3600000);
    const m = Math.floor((rem % 3600000) / 60000);
    const s = Math.floor((rem % 60000) / 1000);
    el.textContent = '↻ ' + p2(h) + ':' + p2(m) + ':' + p2(s);
  } else {
    el.textContent = '';
  }
}, 1000);

/* ── Cache: keyed by IST date (one fetch per day) ────────────────────────── */
function readCache() {
  try {
    const c = JSON.parse(localStorage.getItem(CACHE_KEY) || 'null');
    if (c && c.date === todayIST() && Array.isArray(c.events) && c.events.length) return c;
  } catch(e) {}
  return null;
}

function writeCache(events, model) {
  try {
    // Remove old keys
    localStorage.removeItem(CACHE_KEY);
    localStorage.setItem(CACHE_KEY, JSON.stringify({ date: todayIST(), events, model, ts: Date.now() }));
  } catch(e) {}
}

/* ── Rendering ───────────────────────────────────────────────────────────── */
function showLoading(msg) {
  document.getElementById('content').innerHTML =
    `<div class="state-box"><div class="state-icon">🔍</div><div class="state-title">${msg}</div><div class="dots"><span></span><span></span><span></span></div></div>`;
}

function showError(msg, staleEvents) {
  if (staleEvents && staleEvents.length) {
    // Show stale data with a badge rather than a blank error
    document.getElementById('staleBadge').style.display = 'block';
    renderEvents(staleEvents, true);
    return;
  }
  document.getElementById('content').innerHTML =
    `<div class="state-box"><div class="state-icon">⚠️</div><div class="state-title">Could not load</div><div class="state-sub">${msg}</div></div>`;
}

function renderEvents(events, stale) {
  if (!stale) document.getElementById('staleBadge').style.display = 'none';

  const cached = readCache();
  const ts = cached ? cached.ts : Date.now();
  document.getElementById('metaDate').textContent =
    'Updated ' + new Date(ts).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'}) +
    (stale ? ' (cached)' : '');
  document.getElementById('metaRow').style.display = 'flex';
  document.getElementById('modelUsed').textContent = usedModel || 'Gemini';

  const todayStr = todayIST();
  const upcoming = events.filter(e => {
    if (!e.date) return true;
    return e.date >= todayStr;
  });
  if (!upcoming.length) {
    document.getElementById('content').innerHTML =
      `<div class="state-box"><div class="state-icon">✅</div><div class="state-title">No upcoming events</div></div>`;
    return;
  }

  let html = '<div class="events-wrap"><div class="events">';
  for (const ev of upcoming) {
    const cat = CAT[ev.category] || CAT['Other'];
    const dl  = ev.date
      ? new Date(ev.date + 'T00:00:00').toLocaleDateString('en-IN', {day:'numeric', month:'short'})
      : (ev.dateText || '');
    html += `<div class="card">
      <div class="card-top">
        <div class="cat-icon ${cat.ci}">${cat.icon}</div>
        <div class="card-info">
          <div class="card-title">${ev.title}</div>
          <div class="card-sub">
            <span class="card-date">${dl}</span>
            <span class="cat-pill ${cat.cp}">${ev.category}</span>
          </div>
        </div>
      </div>
    </div>`;
  }
  html += '</div></div>';
  document.getElementById('content').innerHTML = html;
}

/* ── API helpers ─────────────────────────────────────────────────────────── */
function extractEvents(raw) {
  if (!raw) return null;
  let t = raw.replace(/<think>[\s\S]*?<\/think>/gi,'').trim();
  // Try JSON first
  t = t.replace(/```(?:json)?\s*/gi,'').replace(/```\s*/g,'').trim();
  try { const p=JSON.parse(t); if(Array.isArray(p)&&p.length) return p; } catch(e) {}
  const s=t.indexOf('['), e=t.lastIndexOf(']');
  if (s!==-1&&e>s) { try { const p=JSON.parse(t.slice(s,e+1)); if(Array.isArray(p)&&p.length) return p; } catch(e2){} }
  // Pipe-separated lines
  const events=[], lines=t.split('\n').map(l=>l.trim()).filter(l=>l&&l.includes('|'));
  const validCats=['RBI','F&O','Budget','Earnings','Global','Data','Other'];
  for (const line of lines) {
    const parts=line.split('|').map(p=>p.trim());
    if (parts.length>=3) {
      const [date,title,category]=parts;
      if (/^\d{4}-\d{2}-\d{2}$/.test(date)) {
        const cat=validCats.find(c=>category.includes(c))||'Other';
        events.push({title,date,category:cat});
      }
    }
  }
  return events.length ? events : null;
}

async function getModel() {
  const r = await fetch(MODELS_EP);
  if (!r.ok) throw new Error('API proxy unreachable');
  const data = await r.json();
  const avail = (data.models||[])
    .filter(m=>(m.supportedGenerationMethods||[]).includes('generateContent'))
    .map(m=>m.name.replace('models/',''));
  for (const p of PREFERRED) { const f=avail.find(a=>a===p||a.startsWith(p+'-')); if(f) return f; }
  if (avail.length) return avail[0];
  throw new Error('No models available');
}

async function fetchAndRender(staleEvents) {
  showLoading('Connecting to Gemini…');
  try {
    const model = await getModel();
    usedModel = model;
    showLoading('Fetching market events…');
    const today = todayIST();
    const end   = new Date(today); end.setDate(end.getDate()+45);
    const endStr = end.toISOString().split('T')[0];

    // Compact prompt = fewer tokens consumed
    const prompt =
`Indian market events ${today} to ${endStr}. Output ONLY pipe-separated lines: DATE|TITLE|CATEGORY
DATE=YYYY-MM-DD, TITLE max 7 words, CATEGORY one of: RBI F&O Budget Earnings Global Data Other
Include: weekly NSE F&O expiry (every Thu), RBI MPC dates, India CPI/WPI/GDP/IIP releases, major Nifty50 earnings, US Fed FOMC.
No headers. No explanation.`;

    const r = await fetch(CONTENT_EP, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model, body:{
        contents:[{parts:[{text:prompt}]}],
        generationConfig:{ temperature:0, maxOutputTokens:1500 }  // halved — saves tokens
      }})
    });
    if (!r.ok) { const e=await r.json(); throw new Error(e?.error?.message||'HTTP '+r.status); }
    const data = await r.json();
    let raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    raw = raw.replace(/<think>[\s\S]*?<\/think>/gi,'').trim();
    let events = extractEvents(raw);
    if (!events || !events.length) throw new Error('No events returned');
    events.sort((a,b)=>a.date>b.date?1:-1);
    writeCache(events, model);
    renderEvents(events, false);
  } catch(err) {
    showError(err.message||'Unknown error', staleEvents);
  }
}

/* ── Boot + daily scheduler ──────────────────────────────────────────────── */
function boot() {
  const cached = readCache();
  if (cached) {
    usedModel = cached.model || '';
    renderEvents(cached.events, false);
    // Still schedule next-day refresh
    scheduleNextRefresh(cached.events);
    return;
  }
  fetchAndRender(null);
}

function scheduleNextRefresh(staleEvents) {
  const msLeft = next6amIST() - Date.now();
  setTimeout(() => {
    fetchAndRender(staleEvents);
  }, msLeft + 500);
}

boot();
</script>
</body>
</html>
