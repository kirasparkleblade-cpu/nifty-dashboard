<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Moneycontrol News</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
rel="stylesheet">

<style>

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    background:#ffffff;

    overflow:hidden;

    font-family:
    'Space Grotesk',
    sans-serif;
}

body{

    padding:12px;

    box-sizing:border-box;
}

.container{

    width:100%;
    height:100%;

    background:#ffffff;

    border:1px solid #ececec;

    border-radius:28px;

    padding:22px;

    box-sizing:border-box;

    overflow-y:auto;
}

.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:18px;
}

.title{

    font-size:22px;

    font-weight:700;

    color:#111111;

    letter-spacing:-0.5px;
}

.live{

    display:flex;

    align-items:center;

    gap:8px;

    font-size:12px;

    color:#777;

    font-weight:600;
}

.dot{

    width:8px;
    height:8px;

    border-radius:50%;

    background:#22c55e;
}

.news-list{

    display:flex;

    flex-direction:column;

    gap:12px;
}

.news-card{

    display:block;

    text-decoration:none;

    padding:16px;

    border:1px solid #f0f0f0;

    border-radius:18px;

    transition:0.2s ease;

    background:#ffffff;
}

.news-card:hover{

    background:#fafafa;

    transform:translateY(-2px);
}

.news-title{

    font-size:15px;

    line-height:1.5;

    font-weight:600;

    color:#111111;

    margin-bottom:8px;
}

.news-date{

    font-size:12px;

    color:#888888;
}

.loading{

    color:#888;

    font-size:14px;
}

.error{

    color:#ef4444;

    font-size:14px;
}

::-webkit-scrollbar{

    width:6px;
}

::-webkit-scrollbar-thumb{

    background:#dddddd;

    border-radius:999px;
}

</style>

</head>

<body>

<div class="container">

    <div class="header">

        <div class="title">
            Market News
        </div>

        <div class="live">

            <div class="dot"></div>

            <div>
                LIVE
            </div>

        </div>

    </div>

    <div class="news-list"
    id="news">

        <div class="loading">
            Loading latest finance news...
        </div>

    </div>

</div>

<script>

async function loadNews(){

    try{

        const response =
        await fetch('/api/news');

        const data =
        await response.json();

        const news =
        document.getElementById('news');

        news.innerHTML = '';

        if(!data.length){

            news.innerHTML =
            '<div class="error">No news available</div>';

            return;
        }

        data.forEach(item => {

            const card =
            document.createElement('a');

            card.className =
            'news-card';

            card.href =
            item.link;

            card.target =
            '_blank';

            const date =
            new Date(item.pubDate)
            .toLocaleString(
                'en-IN',
                {
                    day:'2-digit',
                    month:'short',
                    year:'numeric',
                    hour:'2-digit',
                    minute:'2-digit'
                });

            card.innerHTML = `

                <div class="news-title">
                    ${item.title}
                </div>

                <div class="news-date">
                    ${date}
                </div>

            `;

            news.appendChild(card);
        });
    }

    catch(error){

        console.error(error);

        document.getElementById('news')
        .innerHTML =
        '<div class="error">Unable to load news</div>';
    }
}

loadNews();

setInterval(loadNews, 300000);

</script>

</body>

</html>
