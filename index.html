<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIFTY 50 Widget</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#ffffff;
    font-family:'Space Grotesk',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

.widget{
    width:92vw;
    height:82vh;
    background:#ffffff;
    border:1px solid #e5e5e5;
    border-radius:32px;
    padding:42px;
    box-sizing:border-box;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:22px;
}

.header{
    display:flex;
    align-items:center;
    gap:12px;
}

.label{
    color:#6b6b6f;
    font-size:clamp(18px,1.5vw,28px);
    font-weight:500;
    letter-spacing:1px;
    text-transform:uppercase;
}

.refresh-btn{
    width:28px;
    height:28px;
    border:1px solid #e5e5e5;
    border-radius:50%;
    background:#fff;
    cursor:pointer;
    color:#777;
    font-size:14px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.refresh-btn:hover{
    background:#f7f7f7;
}

.price{
    color:#111111;
    font-size:clamp(56px,8vw,120px);
    font-weight:700;
    line-height:1;
    letter-spacing:-2px;
    font-variant-numeric:tabular-nums lining-nums;
}

</style>

</head>

<body>

<div class="widget">

    <div class="header">

        <div class="label">
            NIFTY 50
        </div>

        <button
            class="refresh-btn"
            onclick="fetchPrice()">
            ↻
        </button>

    </div>

    <div
        class="price"
        id="price">
        Loading...
    </div>

</div>

<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnV2YkleLyZu7oH4sRkaSV1k1KToH05LgWDi4xR0wcKquNeuI8134CcF3n8O1OlbvAIedrQq4XvS4f/pub?output=csv';

async function fetchPrice(){

    try{

        const response =
        await fetch(
            CSV_URL + '&t=' + Date.now()
        );

        const text =
        await response.text();

        const rows =
        text.trim().split('\n');

        let currentPrice = null;
        let previousClose = null;

        for(let i = 1; i < rows.length; i++){

            const columns =
            rows[i]
            .replace(/"/g,'')
            .split(',');

            const symbol =
            columns[0]
            .trim()
            .toUpperCase();

            if(symbol === 'NIFTY'){

                currentPrice =
                parseFloat(columns[1]);

                previousClose =
                parseFloat(columns[2]);

                break;
            }
        }

        if(
            currentPrice === null ||
            isNaN(currentPrice)
        ){
            throw new Error();
        }

        const priceEl =
        document.getElementById('price');

        priceEl.innerText =
        currentPrice.toLocaleString(
            'en-IN',
            {
                minimumFractionDigits:2,
                maximumFractionDigits:2
            }
        );

        if(
            previousClose !== null &&
            !isNaN(previousClose)
        ){

            if(currentPrice > previousClose){

                priceEl.style.color =
                '#16a34a';

            }
            else if(currentPrice < previousClose){

                priceEl.style.color =
                '#dc2626';

            }
            else{

                priceEl.style.color =
                '#111111';

            }
        }

    }

    catch(error){

        console.error(error);

        document
        .getElementById('price')
        .innerText =
        'Unavailable';
    }
}

fetchPrice();

setInterval(
    fetchPrice,
    60000
);

</script>

</body>
</html>
