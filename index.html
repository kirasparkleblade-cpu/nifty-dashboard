<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIFTY Minimal</title>

<style>

html, body {

    margin: 0;
    padding: 0;

    background: #191919;

    overflow: hidden;

    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {

    display: flex;

    justify-content: center;

    align-items: center;

    min-height: 100vh;
}

.wrapper {

    display: flex;

    align-items: center;

    gap: 14px;
}

.label {

    color: #ffffff;

    font-size: 28px;

    font-weight: 600;

    letter-spacing: 1px;

    margin-right: 10px;
}

.card {

    width: 140px;

    height: 170px;

    background: #2a2a2a;

    border-radius: 10px;

    display: flex;

    justify-content: center;

    align-items: center;

    position: relative;
}

.card::after {

    content: '';

    position: absolute;

    top: 50%;

    left: 0;

    width: 100%;

    height: 1px;

    background: #1d1d1d;
}

.number {

    color: #ffffff;

    font-size: 84px;

    font-weight: 700;

    line-height: 1;
}

</style>

</head>

<body>

<div class="wrapper">

    <div class="label">
        NIFTY
    </div>

    <div class="card">
        <div class="number" id="left">00</div>
    </div>

    <div class="card">
        <div class="number" id="right">00</div>
    </div>

</div>

<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnV2YkleLyZu7oH4sRkaSV1k1KToH05LgWDi4xR0wcKquNeuI8134CcF3n8O1OlbvAIedrQq4XvS4f/pub?output=csv';

async function fetchPrice() {

    try {

        const response = await fetch(CSV_URL);

        const text = await response.text();

        const rows = text.trim().split('\n');

        const columns = rows[0].split(',');

        const price = parseFloat(columns[1]);

        if (isNaN(price)) return;

        const formatted =
          Math.round(price).toString();

        const left =
          formatted.slice(0, 2);

        const right =
          formatted.slice(2);

        document.getElementById('left').innerText =
          left;

        document.getElementById('right').innerText =
          right;

    }

    catch (e) {

        console.error(e);
    }
}

fetchPrice();

setInterval(fetchPrice, 60000);

</script>

</body>

</html>
