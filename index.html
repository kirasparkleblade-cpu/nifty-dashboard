<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIFTY Widget</title>

<style>

html,
body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    background: #000000;

    font-family: Georgia, serif;
}

body {

    display: flex;

    justify-content: center;

    align-items: center;
}

.widget {

    width: 100vw;
    height: 100vh;

    background: #000000;

    border-radius: 0;

    padding: 4vh;

    box-sizing: border-box;

    display: flex;

    flex-direction: column;
}

.title-box {

    width: 32%;

    height: 18%;

    min-height: 90px;

    background: #7d7d7d;

    border-radius: 28px;

    display: flex;

    justify-content: center;

    align-items: center;

    margin-bottom: 3vh;
}

.title {

    color: #ffffff;

    font-size: clamp(42px, 5vw, 90px);

    font-weight: 500;

    line-height: 1;
}

.price-box {

    flex: 1;

    background: #7d7d7d;

    border-radius: 40px;

    display: flex;

    justify-content: center;

    align-items: center;

    overflow: hidden;
}

.price {

    color: #ffffff;

    font-size: clamp(72px, 10vw, 180px);

    font-weight: 500;

    line-height: 1;

    white-space: nowrap;

    font-variant-numeric: lining-nums tabular-nums;
}

</style>

</head>

<body>

<div class="widget">

    <div class="title-box">

        <div class="title">
            Nifty
        </div>

    </div>

    <div class="price-box">

        <div class="price" id="price">
            Loading...
        </div>

    </div>

</div>

<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnV2YkleLyZu7oH4sRkaSV1k1KToH05LgWDi4xR0wcKquNeuI8134CcF3n8O1OlbvAIedrQq4XvS4f/pub?output=csv';

async function fetchPrice() {

    try {

        const response = await fetch(CSV_URL);

        const text = await response.text();

        const rows = text.trim().split('\n');

        const columns = rows[0].split(',');

        const value = parseFloat(columns[1]);

        if (isNaN(value)) return;

        document.getElementById('price').innerText =
            value.toLocaleString('en-IN', {

                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

    }

    catch (e) {

        console.error(e);

        document.getElementById('price').innerText =
            'Unavailable';
    }
}

fetchPrice();

setInterval(fetchPrice, 60000);

</script>

</body>

</html>
