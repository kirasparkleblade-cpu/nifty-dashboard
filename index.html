<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIFTY 50</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#ffffff;

    font-family:'Space Grotesk',sans-serif;
}

body{

    display:flex;

    justify-content:center;

    align-items:center;
}

.widget{

    width:92vw;
    height:82vh;

    background:#ffffff;

    border:1px solid #e5e5e5;

    border-radius:32px;

    padding:42px;

    box-sizing:border-box;

    display:flex;

    flex-direction:column;

    justify-content:center;

    gap:18px;
}

.header{

    display:flex;

    align-items:center;

    gap:10px;
}

.label{

    color:#6b6b6f;

    font-size:clamp(18px,1.5vw,28px);

    font-weight:500;

    letter-spacing:1px;

    text-transform:uppercase;
}

.refresh{

    width:26px;
    height:26px;

    border-radius:50%;

    border:1px solid #e5e5e5;

    background:#fff;

    cursor:pointer;

    font-size:14px;

    color:#666;

    display:flex;

    align-items:center;

    justify-content:center;

    transition:all .2s ease;
}

.refresh:hover{

    background:#f5f5f5;

    transform:rotate(90deg);
}

.price{

    font-size:clamp(56px,8vw,120px);

    font-weight:700;

    line-height:1;

    letter-spacing:-2px;

    font-variant-numeric:
    tabular-nums lining-nums;

    color:#111;
}

.change{

    font-size:clamp(18px,1.4vw,26px);

    font-weight:600;
}

</style>

</head>

<body>

<div class="widget">

    <div class="header">

        <div class="label">

            NIFTY 50

        </div>

        <button
        class="refresh"
        onclick="fetchPrice()">

            ↻

        </button>

    </div>

    <div
    class="price"
    id="price">

        Loading...

    </div>

    <div
    class="change"
    id="change">

        --

    </div>

</div>

<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnV2YkleLyZu7oH4sRkaSV1k1KToH05LgWDi4xR0wcKquNeuI8134CcF3n8O1OlbvAIedrQq4XvS4f/pub?output=csv';

async function fetchPrice(){

    try{

        const response =
        await fetch(
            CSV_URL +
            '&t=' +
            Date.now()
        );

        const text =
        await response.text();

        const rows =
        text.trim().split('\n');

        const columns =
        rows[0].split(',');

        const current =
        parseFloat(columns[1]);

        const previous =
        parseFloat(columns[2]);

        if(
            isNaN(current)
        ){
            return;
        }

        const price =
        document.getElementById(
            'price'
        );

        const change =
        document.getElementById(
            'change'
        );

        const points =
        current - previous;

        const percent =
        (points / previous) * 100;

        if(points > 0){

            price.style.color =
            '#16a34a';

            change.style.color =
            '#16a34a';
        }

        else if(points < 0){

            price.style.color =
            '#dc2626';

            change.style.color =
            '#dc2626';
        }

        else{

            price.style.color =
            '#6b7280';

            change.style.color =
            '#6b7280';
        }

        price.innerText =
        current.toLocaleString(
            'en-IN',
            {
                minimumFractionDigits:2,
                maximumFractionDigits:2
            }
        );

        change.innerText =
        `${points > 0 ? '+' : ''}${points.toFixed(2)}
        (${percent.toFixed(2)}%)`;

    }

    catch(e){

        console.error(e);

        document
        .getElementById(
            'price'
        )
        .innerText =
        'Unavailable';
    }
}

fetchPrice();

setInterval(
    fetchPrice,
    60000
);

</script>

</body>
</html>
