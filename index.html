<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIFTY Widget</title>

<style>

html, body {

    margin: 0;
    padding: 0;

    background: transparent;

    overflow: hidden;

    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {

    display: inline-block;

    padding: 8px;

    background: #191919;
}

.container {

    display: flex;

    align-items: baseline;

    gap: 12px;
}

.symbol {

    color: #ffffff;

    font-size: 18px;

    font-weight: 600;
}

.price {

    color: #ffffff;

    font-size: 32px;

    font-weight: 700;
}

.live {

    color: #ffffff;

    font-size: 14px;

    opacity: 0.7;
}

</style>

</head>

<body>

<div class="container">

    <div class="symbol">
        NIFTY 50
    </div>

    <div class="price" id="price">
        Loading...
    </div>

    <div class="live">
        LIVE
    </div>

</div>

<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnV2YkleLyZu7oH4sRkaSV1k1KToH05LgWDi4xR0wcKquNeuI8134CcF3n8O1OlbvAIedrQq4XvS4f/pub?output=csv';

async function fetchPrice() {

    try {

        const response = await fetch(CSV_URL);

        const text = await response.text();

        const rows = text.trim().split('\n');

        const columns = rows[0].split(',');

        const price = parseFloat(columns[1]);

        if (isNaN(price)) {

            document.getElementById('price').innerText =
              'No Data';

            return;
        }

        document.getElementById('price').innerText =
            price.toFixed(2);

    }

    catch (e) {

        console.error(e);

        document.getElementById('price').innerText =
            'Unavailable';
    }
}

fetchPrice();

setInterval(fetchPrice, 60000);

</script>

</body>

</html>
