<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <title>NIFTY Dashboard</title>

  <script src="https://unpkg.com/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    body {
      margin: 0;
      background: #111;
    }

    #chart {
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>

<body>

<div id="chart"></div>

<script>

const chartContainer = document.getElementById('chart');

const chart = LightweightCharts.createChart(chartContainer, {
    width: window.innerWidth,
    height: window.innerHeight,

    layout: {
        background: {
            color: '#111111'
        },
        textColor: '#d1d4dc',
    },

    grid: {
        vertLines: {
            color: '#222'
        },
        horzLines: {
            color: '#222'
        },
    },
});

const series = chart.addLineSeries();

series.setData([
    { time: '2024-01-01', value: 21000 },
    { time: '2024-01-02', value: 21200 },
    { time: '2024-01-03', value: 21100 },
    { time: '2024-01-04', value: 21400 },
    { time: '2024-01-05', value: 21600 },
    { time: '2024-01-06', value: 21550 },
    { time: '2024-01-07', value: 21720 }
]);

window.addEventListener('resize', () => {
    chart.resize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
