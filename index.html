<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIFTY Widget</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

<style>

html,
body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    background: #ffffff;

    font-family: 'Space Grotesk', sans-serif;
}

body {

    display: flex;

    justify-content: center;

    align-items: center;
}

.widget {

    width: 92vw;
    height: 82vh;

    background: #ffffff;

    border: 1px solid #e5e5e5;

    border-radius: 32px;

    padding: 42px;

    box-sizing: border-box;

    display: flex;

    flex-direction: column;

    justify-content: center;

    gap: 22px;
}

.top {

    display: flex;

    align-items: center;

    justify-content: space-between;
}

.label {

    color: #6b6b6f;

    font-size: clamp(18px, 1.5vw, 28px);

    font-weight: 500;

    letter-spacing: 1px;

    text-transform: uppercase;
}

.refresh-btn {

    width: 30px;
    height: 30px;

    border-radius: 50%;

    border: 1px solid #e5e5e5;

    background: #ffffff;

    display: flex;

    align-items: center;

    justify-content: center;

    cursor: pointer;

    transition: all 0.2s ease;

    font-size: 13px;

    color: #555;

    padding: 0;
}

.refresh-btn:hover {

    background: #f5f5f5;

    transform: rotate(90deg);
}

.price {

    color: #111111;

    font-size: clamp(56px, 8vw, 120px);

    font-weight: 700;

    line-height: 1;

    letter-spacing: -2px;

    font-variant-numeric:
      tabular-nums lining-nums;
}

.live {

    display: flex;

    align-items: center;

    gap: 10px;

    color: #7d7d82;

    font-size: clamp(14px, 1vw, 18px);

    font-weight: 500;
}

.dot {

    width: 8px;
    height: 8px;

    background: #22c55e;

    border-radius: 50%;
}

</style>

</head>

<body>

<div class="widget">

    <div class="top">

        <div class="label">
            NIFTY 50
        </div>

        <button
            class="refresh-btn"
            id="refreshBtn">

            ↻

        </button>

    </div>

    <div
        class="price"
        id="price">

        Loading...

    </div>

    <div class="live">

        <div class="dot"></div>

        <div>
            Live
        </div>

    </div>

</div>

<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnV2YkleLyZu7oH4sRkaSV1k1KToH05LgWDi4xR0wcKquNeuI8134CcF3n8O1OlbvAIedrQq4XvS4f/pub?output=csv';

async function fetchPrice() {

    try {

        const response =
        await fetch(

            CSV_URL +
            '&t=' +
            Date.now()

        );

        const text =
        await response.text();

        const rows =
        text.trim().split('\n');

        const columns =
        rows[0].split(',');

        const value =
        parseFloat(columns[1]);

        if (isNaN(value)) return;

        document
        .getElementById('price')
        .innerText =

            value.toLocaleString(
                'en-IN',
                {

                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                }
            );
    }

    catch (e) {

        console.error(e);

        document
        .getElementById('price')
        .innerText =

        'Unavailable';
    }
}

fetchPrice();

setInterval(fetchPrice, 60000);

document
.getElementById('refreshBtn')
.addEventListener('click', async () => {

    const btn =
    document.getElementById('refreshBtn');

    btn.style.opacity = '0.5';

    await fetchPrice();

    setTimeout(() => {

        btn.style.opacity = '1';

    }, 300);
});

</script>

</body>
</html>
