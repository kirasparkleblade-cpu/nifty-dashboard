<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NIFTY Dashboard</title>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>

<style>
body {
  margin: 0;
  background: #111;
}

#chart {
  width: 100vw;
  height: 100vh;
}
</style>
</head>

<body>

<div id="chart"></div>

<script>

const chart = LightweightCharts.createChart(
  document.getElementById('chart'),
  {
    layout: {
      background: { color: '#111' },
      textColor: '#DDD',
    },

    width: window.innerWidth,
    height: window.innerHeight
  }
);

const areaSeries = chart.addAreaSeries();

areaSeries.setData([
  { time: '2024-01-01', value: 21500 },
  { time: '2024-01-02', value: 21600 },
  { time: '2024-01-03', value: 21450 },
  { time: '2024-01-04', value: 21720 },
  { time: '2024-01-05', value: 21810 },
  { time: '2024-01-06', value: 21950 },
  { time: '2024-01-07', value: 22100 }
]);

window.addEventListener('resize', () => {
  chart.resize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
