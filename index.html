<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIFTY Widget</title>

<style>

html,
body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    background: #191919;

    font-family:
      Inter,
      -apple-system,
      BlinkMacSystemFont,
      sans-serif;
}

body {

    display: flex;

    justify-content: center;

    align-items: center;
}

.widget {

    width: 92vw;
    height: 82vh;

    background: #191919;

    border: 1px solid #2a2a2a;

    border-radius: 32px;

    padding: 42px;

    box-sizing: border-box;

    display: flex;

    flex-direction: column;

    justify-content: center;

    gap: 28px;
}

.label {

    color: #8e8e93;

    font-size: clamp(22px, 2vw, 36px);

    font-weight: 600;

    letter-spacing: 0.5px;
}

.price {

    color: #ffffff;

    font-size: clamp(90px, 16vw, 240px);

    font-weight: 700;

    line-height: 0.95;

    letter-spacing: -4px;

    font-variant-numeric:
      tabular-nums lining-nums;
}

.live {

    display: flex;

    align-items: center;

    gap: 10px;

    color: #8e8e93;

    font-size: clamp(16px, 1.2vw, 22px);

    font-weight: 500;
}

.dot {

    width: 10px;
    height: 10px;

    background: #22c55e;

    border-radius: 50%;
}

</style>

</head>

<body>

<div class="widget">

    <div class="label">
        NIFTY 50
    </div>

    <div class="price" id="price">
        Loading...
    </div>

    <div class="live">

        <div class="dot"></div>

        <div>
            Live
        </div>

    </div>

</div>

<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnV2YkleLyZu7oH4sRkaSV1k1KToH05LgWDi4xR0wcKquNeuI8134CcF3n8O1OlbvAIedrQq4XvS4f/pub?output=csv';

async function fetchPrice() {

    try {

        const response = await fetch(CSV_URL);

        const text = await response.text();

        const rows = text.trim().split('\n');

        const columns = rows[0].split(',');

        const value = parseFloat(columns[1]);

        if (isNaN(value)) return;

        document.getElementById('price').innerText =
            value.toLocaleString('en-IN', {

                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

    }

    catch (e) {

        console.error(e);

        document.getElementById('price').innerText =
            'Unavailable';
    }
}

fetchPrice();

setInterval(fetchPrice, 60000);

</script>

</body>

</html>
