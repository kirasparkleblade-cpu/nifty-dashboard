<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIFTY Widget</title>

<style>

body {

    margin: 0;

    background: #0d1117;

    display: flex;

    justify-content: center;

    align-items: center;

    height: 100vh;

    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.card {

    background: #131722;

    border: 1px solid #2a2e39;

    border-radius: 16px;

    width: 340px;

    padding: 28px;

    box-shadow:
      0 0 30px rgba(0,0,0,0.45);
}

.header {

    display: flex;

    justify-content: space-between;

    align-items: center;

    margin-bottom: 16px;
}

.symbol {

    color: white;

    font-size: 22px;

    font-weight: 600;
}

.badge {

    background: #2962ff;

    color: white;

    padding: 4px 10px;

    border-radius: 8px;

    font-size: 12px;
}

.price {

    color: white;

    font-size: 52px;

    font-weight: 700;

    margin-top: 10px;
}

.label {

    color: #787b86;

    margin-top: 8px;

    font-size: 14px;
}

.status {

    margin-top: 20px;

    color: #26a69a;

    font-size: 14px;
}

.dot {

    width: 10px;

    height: 10px;

    background: #26a69a;

    border-radius: 50%;

    display: inline-block;

    margin-right: 6px;
}

</style>

</head>

<body>

<div class="card">

    <div class="header">

        <div class="symbol">NIFTY 50</div>

        <div class="badge">LIVE</div>

    </div>

    <div class="price" id="price">
        Loading...
    </div>

    <div class="label">
        NSE Index
    </div>

    <div class="status">
        <span class="dot"></span>
        Auto refresh 1m
    </div>

</div>

<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnV2YkleLyZu7oH4sRkaSV1k1KToH05LgWDi4xR0wcKquNeuI8134CcF3n8O1OlbvAIedrQq4XvS4f/pub?output=csv';

async function fetchPrice() {

    try {

        const response = await fetch(CSV_URL);

        const text = await response.text();

        const rows = text.trim().split('\n');

        const columns = rows[0].split(',');

        const price = parseFloat(columns[1]);

        if (isNaN(price)) {

            document.getElementById('price').innerText =
              'No Data';

            return;
        }

        document.getElementById('price').innerText =
            price.toFixed(2);

    }

    catch (e) {

        console.error(e);

        document.getElementById('price').innerText =
            'Unavailable';
    }
}

fetchPrice();

setInterval(fetchPrice, 60000);

</script>

</body>

</html>
