<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIFTY Widget</title>

<style>

html, body {

    margin: 0;
    padding: 0;

    background: transparent;

    overflow: hidden;

    font-family: Georgia, serif;
}

body {

    display: flex;

    justify-content: center;

    align-items: center;

    min-height: 100vh;
}

.widget {

    background: #000000;

    border-radius: 36px;

    padding: 24px;

    width: 720px;

    box-sizing: border-box;
}

.title-box {

    background: #7a7a7a;

    border-radius: 28px;

    width: 360px;

    height: 110px;

    display: flex;

    justify-content: center;

    align-items: center;

    margin-bottom: 18px;
}

.title {

    color: #ffffff;

    font-size: 64px;

    font-weight: 500;

    line-height: 1;
}

.price-box {

    background: #7a7a7a;

    border-radius: 36px;

    height: 300px;

    display: flex;

    justify-content: center;

    align-items: center;

    padding: 20px;

    box-sizing: border-box;
}

.price {

    color: #ffffff;

    font-size: 110px;

    font-weight: 500;

    line-height: 1;

    letter-spacing: 1px;
}

@media (max-width: 768px) {

    .widget {

        width: 95vw;
    }

    .title-box {

        width: 50%;
        height: 80px;
    }

    .title {

        font-size: 42px;
    }

    .price-box {

        height: 180px;
    }

    .price {

        font-size: 58px;
    }
}

</style>

</head>

<body>

<div class="widget">

    <div class="title-box">

        <div class="title">
            Nifty
        </div>

    </div>

    <div class="price-box">

        <div class="price" id="price">
            Loading...
        </div>

    </div>

</div>

<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnV2YkleLyZu7oH4sRkaSV1k1KToH05LgWDi4xR0wcKquNeuI8134CcF3n8O1OlbvAIedrQq4XvS4f/pub?output=csv';

async function fetchPrice() {

    try {

        const response = await fetch(CSV_URL);

        const text = await response.text();

        const rows = text.trim().split('\n');

        const columns = rows[0].split(',');

        const value = parseFloat(columns[1]);

        if (isNaN(value)) return;

        document.getElementById('price').innerText =
            value.toLocaleString('en-IN', {

                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

    }

    catch (e) {

        console.error(e);

        document.getElementById('price').innerText =
            'Unavailable';
    }
}

fetchPrice();

setInterval(fetchPrice, 60000);

</script>

</body>

</html>
