<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NIFTY Widget</title>

<style>

html,
body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    overflow: hidden;

    background: #000000;

    font-family: Georgia, serif;
}

body {

    display: flex;

    justify-content: center;

    align-items: center;
}

.widget {

    width: 100vw;
    height: 100vh;

    background:
      radial-gradient(circle at top,
      #1a1a1a 0%,
      #000000 70%);

    padding: 4vh;

    box-sizing: border-box;

    display: flex;

    flex-direction: column;

    gap: 3vh;
}

.title-box {

    width: 34%;

    height: 18%;

    min-height: 100px;

    background:
      linear-gradient(
        180deg,
        #8a8a8a 0%,
        #6d6d6d 100%
      );

    border-radius: 34px;

    display: flex;

    justify-content: center;

    align-items: center;

    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.15),
      0 10px 30px rgba(0,0,0,0.55);
}

.title {

    color: #ffffff;

    font-size: clamp(54px, 6vw, 100px);

    font-weight: 500;

    letter-spacing: 1px;

    text-shadow:
      0 2px 4px rgba(0,0,0,0.5);
}

.price-box {

    flex: 1;

    background:
      linear-gradient(
        180deg,
        #8a8a8a 0%,
        #747474 100%
      );

    border-radius: 44px;

    display: flex;

    justify-content: center;

    align-items: center;

    overflow: hidden;

    box-shadow:
      inset 0 2px 0 rgba(255,255,255,0.12),
      0 15px 40px rgba(0,0,0,0.6);
}

.price {

    color: #ffffff;

    font-size: clamp(120px, 15vw, 280px);

    font-weight: 500;

    line-height: 1;

    white-space: nowrap;

    font-variant-numeric: lining-nums tabular-nums;

    letter-spacing: 3px;

    text-shadow:
      0 6px 10px rgba(0,0,0,0.45);
}

</style>

</head>

<body>

<div class="widget">

    <div class="title-box">

        <div class="title">
            Nifty
        </div>

    </div>

    <div class="price-box">

        <div class="price" id="price">
            Loading...
        </div>

    </div>

</div>

<script>

const CSV_URL =
'https://docs.google.com/spreadsheets/d/e/2PACX-1vSnV2YkleLyZu7oH4sRkaSV1k1KToH05LgWDi4xR0wcKquNeuI8134CcF3n8O1OlbvAIedrQq4XvS4f/pub?output=csv';

async function fetchPrice() {

    try {

        const response = await fetch(CSV_URL);

        const text = await response.text();

        const rows = text.trim().split('\n');

        const columns = rows[0].split(',');

        const value = parseFloat(columns[1]);

        if (isNaN(value)) return;

        document.getElementById('price').innerText =
            value.toLocaleString('en-IN', {

                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });

    }

    catch (e) {

        console.error(e);

        document.getElementById('price').innerText =
            'Unavailable';
    }
}

fetchPrice();

setInterval(fetchPrice, 60000);

</script>

</body>

</html>
