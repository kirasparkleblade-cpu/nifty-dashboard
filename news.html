<script>

const newsURL =

'https://api.rss2json.com/v1/api.json?rss_url=' +

encodeURIComponent(

'https://news.google.com/rss/search?q=' +

'NIFTY+OR+BANKNIFTY+OR+NSE+OR+Sensex+OR+' +

'Fed+OR+interest+rates+OR+inflation+OR+' +

'oil+prices+OR+US+markets+OR+global+markets+OR+' +

'earnings+OR+RBI+OR+economy&hl=en-IN&gl=IN&ceid=IN:en'

);

function formatDateTime(dateString) {

    const date =
    new Date(dateString);

    return date.toLocaleString(

        'en-IN',

        {

            day: 'numeric',

            month: 'short',

            year: 'numeric',

            hour: 'numeric',

            minute: '2-digit',

            hour12: true
        }
    );
}

function isRecent(dateString) {

    const articleDate =
    new Date(dateString);

    const now =
    new Date();

    const diffDays =

        (now - articleDate) /

        (1000 * 60 * 60 * 24);

    return diffDays <= 3;
}

async function loadNews() {

    try {

        const response =

        await fetch(

            newsURL +
            '&t=' +
            Date.now()

        );

        const data =
        await response.json();

        const container =

        document.getElementById(
            'marketNews'
        );

        container.innerHTML = '';

        if (
            !data.items ||
            data.items.length === 0
        ) {

            container.innerHTML = `

                <div class="loading">

                    No news available

                </div>

            `;

            return;
        }

        const filteredNews =

        data.items.filter(item =>

            isRecent(item.pubDate)

        );

        filteredNews
        .slice(0, 12)
        .forEach(item => {

            const card =

            document.createElement(
                'a'
            );

            card.href =
            item.link;

            card.target =
            '_blank';

            card.className =
            'news-card';

            card.innerHTML = `

                <div class="news-headline">

                    ${item.title}

                </div>

                <div class="news-footer">

                    <div class="news-time">

                        ${formatDateTime(
                            item.pubDate
                        )}

                    </div>

                    <div class="tag">

                        NEWS

                    </div>

                </div>

            `;

            container.appendChild(card);
        });

    }

    catch (error) {

        console.error(error);

        document.getElementById(
            'marketNews'
        ).innerHTML = `

            <div class="loading">

                Unable to load news

            </div>

        `;
    }
}

loadNews();

setInterval(
    loadNews,
    300000
);

</script>
