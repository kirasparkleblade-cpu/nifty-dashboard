<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Indian Market News</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

* {

    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html,
body {

    width: 100%;
    height: 100%;

    background: transparent;

    overflow: hidden;

    font-family:
    'Inter',
    sans-serif;
}

body {

    display: flex;

    justify-content: center;

    align-items: center;
}

.widget {

    width: 100%;
    height: 100%;

    padding: 22px;

    overflow-y: auto;

    border-radius: 30px;

    background:
    rgba(255,255,255,0.72);

    backdrop-filter:
    blur(18px);

    border:
    1px solid rgba(0,0,0,0.06);

    box-shadow:
    0 8px 40px rgba(0,0,0,0.05);
}

.widget::-webkit-scrollbar {

    width: 5px;
}

.widget::-webkit-scrollbar-thumb {

    background: #d8d8d8;

    border-radius: 999px;
}

.topbar {

    display: flex;

    justify-content: space-between;

    align-items: center;

    margin-bottom: 22px;
}

.title {

    font-size: 14px;

    font-weight: 800;

    color: #6f6f75;

    letter-spacing: 1.5px;
}

.live {

    display: flex;

    align-items: center;

    gap: 8px;

    color: #7d7d82;

    font-size: 12px;

    font-weight: 600;
}

.dot {

    width: 8px;
    height: 8px;

    border-radius: 50%;

    background: #22c55e;

    animation:
    pulse 1.4s infinite;
}

@keyframes pulse {

    0% {

        transform: scale(1);
        opacity: 1;
    }

    50% {

        transform: scale(1.4);
        opacity: 0.5;
    }

    100% {

        transform: scale(1);
        opacity: 1;
    }
}

.section {

    margin-bottom: 28px;
}

.section-title {

    font-size: 12px;

    font-weight: 700;

    color: #8b8b90;

    letter-spacing: 1px;

    margin-bottom: 14px;

    text-transform: uppercase;
}

.news-card {

    display: block;

    text-decoration: none;

    padding: 16px;

    margin-bottom: 12px;

    border-radius: 20px;

    background:
    rgba(255,255,255,0.75);

    border:
    1px solid rgba(0,0,0,0.05);

    transition:
    all 0.25s ease;
}

.news-card:hover {

    transform:
    translateY(-2px);

    background:
    rgba(255,255,255,0.95);

    box-shadow:
    0 10px 24px rgba(0,0,0,0.06);
}

.news-headline {

    font-size: 15px;

    font-weight: 700;

    line-height: 1.45;

    color: #111111;

    margin-bottom: 10px;
}

.news-footer {

    display: flex;

    justify-content: space-between;

    align-items: center;
}

.news-time {

    font-size: 12px;

    color: #8f8f95;
}

.tag {

    padding: 6px 10px;

    border-radius: 999px;

    background: #f3f3f3;

    color: #666;

    font-size: 11px;

    font-weight: 700;
}

.loading {

    font-size: 14px;

    color: #666;
}

</style>

</head>

<body>

<div class="widget">

<div class="topbar">

<div class="title">
INDIAN MARKET NEWS
</div>

<div class="live">

<div class="dot"></div>

<div>LIVE</div>

</div>

</div>

<div class="section">

<div class="section-title">
MARKET + NIFTY
</div>

<div id="marketNews">

<div class="loading">
Loading latest market news...
</div>

</div>

</div>

<div class="section">

<div class="section-title">
EARNINGS RESULTS
</div>

<div id="earningsNews">

<div class="loading">
Loading earnings updates...
</div>

</div>

</div>

</div>

<script>

const marketURL =

'https://api.rss2json.com/v1/api.json?rss_url=' +

encodeURIComponent(

'https://news.google.com/rss/search?q=' +

'NIFTY+OR+BANKNIFTY+OR+NSE+OR+BSE+OR+' +

'"Indian stock market"+OR+Sensex+when:1d&hl=en-IN&gl=IN&ceid=IN:en'

);

const earningsURL =

'https://api.rss2json.com/v1/api.json?rss_url=' +

encodeURIComponent(

'https://news.google.com/rss/search?q=' +

'India+stocks+earnings+results+quarterly+profit+' +

'NSE+companies+when:1d&hl=en-IN&gl=IN&ceid=IN:en'

);

function timeAgo(date) {

    const seconds =
    Math.floor(
        (new Date() - new Date(date)) / 1000
    );

    const intervals = {

        hour: 3600,
        minute: 60
    };

    for (const key in intervals) {

        const interval =
        Math.floor(
            seconds / intervals[key]
        );

        if (interval >= 1) {

            return interval +
            ' ' +
            key +
            (interval > 1 ? 's' : '') +
            ' ago';
        }
    }

    return 'Just now';
}

async function loadSection(
    url,
    containerId,
    tag
) {

    try {

        const response =
        await fetch(
            url +
            '&t=' +
            Date.now()
        );

        const data =
        await response.json();

        const container =
        document.getElementById(
            containerId
        );

        container.innerHTML = '';

        data.items
        .slice(0, 6)
        .forEach(item => {

            const card =
            document.createElement(
                'a'
            );

            card.href =
            item.link;

            card.target =
            '_blank';

            card.className =
            'news-card';

            card.innerHTML = `

                <div class="news-headline">

                    ${item.title}

                </div>

                <div class="news-footer">

                    <div class="news-time">

                        ${timeAgo(item.pubDate)}

                    </div>

                    <div class="tag">

                        ${tag}

                    </div>

                </div>

            `;

            container.appendChild(card);
        });

    }

    catch (e) {

        document.getElementById(
            containerId
        ).innerHTML = `

            <div class="loading">

                Unable to load news

            </div>

        `;
    }
}

function refreshNews() {

    loadSection(
        marketURL,
        'marketNews',
        'MARKET'
    );

    loadSection(
        earningsURL,
        'earningsNews',
        'EARNINGS'
    );
}

refreshNews();

setInterval(
    refreshNews,
    300000
);

</script>

</body>

</html>
