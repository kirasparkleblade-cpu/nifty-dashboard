<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Market News</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
rel="stylesheet">

<style>

html,
body {

    margin: 0;
    padding: 0;

    width: 100%;
    height: 100%;

    background: transparent;

    overflow: hidden;

    font-family:
    'Inter',
    sans-serif;
}

body {

    display: flex;

    justify-content: center;

    align-items: center;
}

.widget {

    width: 100%;
    height: 100%;

    background:
    rgba(255,255,255,0.72);

    backdrop-filter:
    blur(20px);

    border:
    1px solid rgba(0,0,0,0.06);

    border-radius: 28px;

    padding: 22px;

    box-sizing: border-box;

    overflow-y: auto;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.06);

    animation:
    fadeIn 0.6s ease;
}

@keyframes fadeIn {

    from {

        opacity: 0;
        transform: translateY(10px);
    }

    to {

        opacity: 1;
        transform: translateY(0);
    }
}

.widget::-webkit-scrollbar {

    width: 5px;
}

.widget::-webkit-scrollbar-thumb {

    background: #d8d8d8;

    border-radius: 20px;
}

.header {

    display: flex;

    justify-content: space-between;

    align-items: center;

    margin-bottom: 22px;
}

.title {

    font-size: 14px;

    font-weight: 700;

    color: #707076;

    letter-spacing: 1.4px;
}

.live {

    display: flex;

    align-items: center;

    gap: 6px;

    font-size: 12px;

    color: #7d7d82;
}

.dot {

    width: 8px;
    height: 8px;

    border-radius: 50%;

    background: #22c55e;

    animation:
    pulse 1.5s infinite;
}

@keyframes pulse {

    0% {

        transform: scale(1);
        opacity: 1;
    }

    50% {

        transform: scale(1.3);
        opacity: 0.6;
    }

    100% {

        transform: scale(1);
        opacity: 1;
    }
}

.news-item {

    padding: 16px;

    margin-bottom: 14px;

    border-radius: 18px;

    background:
    rgba(255,255,255,0.55);

    border:
    1px solid rgba(0,0,0,0.04);

    transition:
    all 0.25s ease;

    cursor: pointer;
}

.news-item:hover {

    transform:
    translateY(-2px);

    background:
    rgba(255,255,255,0.92);

    box-shadow:
    0 8px 24px rgba(0,0,0,0.08);
}

.news-headline {

    font-size: 15px;

    line-height: 1.45;

    color: #111111;

    font-weight: 600;

    margin-bottom: 10px;
}

.news-footer {

    display: flex;

    justify-content: space-between;

    align-items: center;
}

.news-time {

    font-size: 12px;

    color: #8a8a90;
}

.news-tag {

    font-size: 11px;

    font-weight: 600;

    padding: 6px 10px;

    border-radius: 999px;

    background: #f2f2f2;

    color: #666;
}

a {

    text-decoration: none;
}

</style>

</head>

<body>

<div class="widget">

<div class="header">

<div class="title">
MARKET NEWS
</div>

<div class="live">

<div class="dot"></div>

<div>LIVE</div>

</div>

</div>

<div id="newsContainer">

<div class="news-item">

<div class="news-headline">
Loading latest market news...
</div>

</div>

</div>

</div>

<script>

const RSS_URL =

'https://api.rss2json.com/v1/api.json?rss_url=' +

encodeURIComponent(
'https://news.google.com/rss/search?q=indian+stock+market'
);

async function loadNews() {

    try {

        const response =
        await fetch(
            RSS_URL +
            '&t=' +
            Date.now()
        );

        const data =
        await response.json();

        const container =
        document.getElementById(
            'newsContainer'
        );

        container.innerHTML = '';

        data.items
        .slice(0, 8)
        .forEach(item => {

            const div =
            document.createElement(
                'a'
            );

            div.href =
            item.link;

            div.target =
            '_blank';

            div.className =
            'news-item';

            div.innerHTML = `

                <div class="news-headline">

                    ${item.title}

                </div>

                <div class="news-footer">

                    <div class="news-time">

                        ${new Date(
                            item.pubDate
                        ).toLocaleString(
                            'en-IN',
                            {
                                day: 'numeric',
                                month: 'short',
                                hour: 'numeric',
                                minute: '2-digit'
                            }
                        )}

                    </div>

                    <div class="news-tag">

                        MARKET

                    </div>

                </div>

            `;

            container.appendChild(div);
        });
    }

    catch (e) {

        document.getElementById(
            'newsContainer'
        ).innerHTML = `

            <div class="news-item">

                <div class="news-headline">

                    Unable to load news

                </div>

            </div>

        `;
    }
}

loadNews();

setInterval(
    loadNews,
    300000
);

</script>

</body>

</html>
