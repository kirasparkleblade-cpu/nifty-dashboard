<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Indian Stock Market News</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
rel="stylesheet">

<style>

* {

    margin: 0;
    padding: 0;

    box-sizing: border-box;
}

html,
body {

    width: 100%;
    height: 100%;

    overflow: hidden;

    background: transparent;

    font-family:
    'Inter',
    sans-serif;
}

body {

    display: flex;

    justify-content: center;

    align-items: center;
}

.widget {

    width: 100%;
    height: 100%;

    padding: 20px;

    overflow-y: auto;

    border-radius: 30px;

    background:
    rgba(255,255,255,0.84);

    backdrop-filter:
    blur(18px);

    border:
    1px solid rgba(0,0,0,0.05);

    box-shadow:
    0 10px 30px rgba(0,0,0,0.04);
}

.widget::-webkit-scrollbar {

    width: 4px;
}

.widget::-webkit-scrollbar-thumb {

    background: #d5d5d5;

    border-radius: 999px;
}

.topbar {

    display: flex;

    justify-content: space-between;

    align-items: center;

    margin-bottom: 24px;
}

.title {

    font-size: 14px;

    font-weight: 800;

    letter-spacing: 1.5px;

    color: #6d6d72;
}

.live {

    display: flex;

    align-items: center;

    gap: 8px;

    font-size: 12px;

    color: #8d8d92;

    font-weight: 700;
}

.dot {

    width: 8px;
    height: 8px;

    border-radius: 50%;

    background: #22c55e;

    animation:
    pulse 1.5s infinite;
}

@keyframes pulse {

    0% {

        opacity: 1;
        transform: scale(1);
    }

    50% {

        opacity: 0.5;
        transform: scale(1.5);
    }

    100% {

        opacity: 1;
        transform: scale(1);
    }
}

.section {

    margin-bottom: 26px;
}

.section-title {

    font-size: 11px;

    font-weight: 800;

    letter-spacing: 1px;

    color: #9a9aa0;

    text-transform: uppercase;

    margin-bottom: 14px;
}

.news-card {

    display: block;

    text-decoration: none;

    padding: 18px;

    margin-bottom: 12px;

    border-radius: 22px;

    background:
    rgba(255,255,255,0.92);

    border:
    1px solid rgba(0,0,0,0.05);

    transition:
    all 0.22s ease;
}

.news-card:hover {

    transform:
    translateY(-2px);

    box-shadow:
    0 10px 24px rgba(0,0,0,0.06);
}

.news-title {

    font-size: 15px;

    font-weight: 700;

    line-height: 1.45;

    color: #111111;

    margin-bottom: 12px;
}

.news-footer {

    display: flex;

    justify-content: space-between;

    align-items: center;
}

.news-time {

    font-size: 12px;

    color: #8f8f95;
}

.tag {

    padding: 6px 10px;

    border-radius: 999px;

    background: #f3f3f3;

    color: #6f6f74;

    font-size: 10px;

    font-weight: 800;

    letter-spacing: 0.5px;
}

.loading {

    color: #777;

    font-size: 14px;
}

</style>

</head>

<body>

<div class="widget">

<div class="topbar">

<div class="title">
INDIAN STOCK MARKET
</div>

<div class="live">

<div class="dot"></div>

<div>LIVE</div>

</div>

</div>

<div class="section">

<div class="section-title">
NIFTY + BANKNIFTY
</div>

<div id="market-news">

<div class="loading">
Loading market news...
</div>

</div>

</div>

<div class="section">

<div class="section-title">
EARNINGS + RESULTS
</div>

<div id="earnings-news">

<div class="loading">
Loading earnings...
</div>

</div>

</div>

<div class="section">

<div class="section-title">
STOCK MOVERS
</div>

<div id="stocks-news">

<div class="loading">
Loading stocks...
</div>

</div>

</div>

</div>

<script>

const marketURL =

'https://news.google.com/rss/search?q=' +

'NIFTY+BANKNIFTY+Sensex+Indian+stock+market&hl=en-IN&gl=IN&ceid=IN:en';

const earningsURL =

'https://news.google.com/rss/search?q=' +

'India+stocks+earnings+results+NSE+BSE&hl=en-IN&gl=IN&ceid=IN:en';

const stocksURL =

'https://news.google.com/rss/search?q=' +

'NSE+stocks+top+gainers+top+losers+Indian+market&hl=en-IN&gl=IN&ceid=IN:en';

function rssToJson(url) {

    return

    'https://api.rss2json.com/v1/api.json?rss_url=' +

    encodeURIComponent(url) +

    '&t=' +

    Date.now();
}

function timeAgo(date) {

    const seconds =

    Math.floor(

        (new Date() - new Date(date)) / 1000
    );

    const intervals = {

        hour: 3600,
        minute: 60
    };

    for (const key in intervals) {

        const interval =

        Math.floor(

            seconds / intervals[key]
        );

        if (interval >= 1) {

            return interval +

            ' ' +

            key +

            (interval > 1 ? 's' : '') +

            ' ago';
        }
    }

    return 'Just now';
}

async function loadNews(
    url,
    containerId,
    tag
) {

    try {

        const response =

        await fetch(
            rssToJson(url)
        );

        const data =
        await response.json();

        const container =

        document.getElementById(
            containerId
        );

        container.innerHTML = '';

        if (!data.items ||
            data.items.length === 0) {

            container.innerHTML =

            '<div class="loading">No news available</div>';

            return;
        }

        data.items
        .slice(0, 5)
        .forEach(item => {

            const card =
            document.createElement('a');

            card.className =
            'news-card';

            card.href =
            item.link;

            card.target =
            '_blank';

            card.innerHTML = `

                <div class="news-title">

                    ${item.title}

                </div>

                <div class="news-footer">

                    <div class="news-time">

                        ${timeAgo(item.pubDate)}

                    </div>

                    <div class="tag">

                        ${tag}

                    </div>

                </div>

            `;

            container.appendChild(card);
        });

    }

    catch (error) {

        document.getElementById(
            containerId
        ).innerHTML =

        '<div class="loading">Unable to load news</div>';

        console.error(error);
    }
}

function refreshNews() {

    loadNews(
        marketURL,
        'market-news',
        'MARKET'
    );

    loadNews(
        earningsURL,
        'earnings-news',
        'EARNINGS'
    );

    loadNews(
        stocksURL,
        'stocks-news',
        'STOCKS'
    );
}

refreshNews();

setInterval(
    refreshNews,
    300000
);

</script>

</body>

</html>
